<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow Premium</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f0ece4; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .gold-gradient { background: linear-gradient(135deg, #c9973a 0%, #a67c2e 100%); }
        .card-dark { background: #141414; border: 1px solid rgba(255,255,255,0.05); }
        .slot-active { background: rgba(201, 151, 58, 0.15); border-left: 4px solid #c9973a; }
        .slot-blocked { background: rgba(255, 255, 255, 0.05); border-left: 4px solid #444; color: #666; }
        input, select { background: #1a1a1a !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        input:focus { border-color: #c9973a !important; outline: none; }
        option { background: #1a1a1a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { createClient } = supabase;

        // --- CONFIGURAÇÃO SUPABASE COM A NOVA CHAVE ---
        const SB_URL = 'https://pvsmbsoqhkcpdeztosrg.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2c21ic29xaGtjcGRlenRvc3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NTEyOTUsImV4cCI6MjA4ODQyNzI5NX0.UufvlSa0Eyk7JPFrMVe3TmsuYTpWppi3PA6I2uhcqa4';
        const client = createClient(SB_URL, SB_KEY);

        const Icon = ({ name, size = 20, className = "" }) => {
            const LucideIcon = lucide.icons[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        function App() {
            const [view, setView] = useState('agenda');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [loading, setLoading] = useState(true);
            const [barbeiros, setBarbeiros] = useState([]);
            const [servicos, setServicos] = useState([]);
            const [agenda, setAgenda] = useState([]);
            const [modalOpen, setModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);

            const [form, setForm] = useState({
                cliente: '', whatsapp: '', barbeiro_nome: '', servico_nome: '', 
                hora: '09:00', duracao: 30, tipo: 'appt'
            });

            useEffect(() => {
                fetchInitialData();
            }, []);

            useEffect(() => {
                fetchAgenda();
                // Opcional: Atualizar ícones após renderizar
                setTimeout(() => lucide.createIcons(), 100);
            }, [currentDate, view]);

            async function fetchInitialData() {
                try {
                    setLoading(true);
                    const { data: b } = await client.from('barbeiros').select('*').order('nome');
                    const { data: s } = await client.from('servicos').select('*').order('nome');
                    setBarbeiros(b || []);
                    setServicos(s || []);
                    await fetchAgenda();
                } catch (err) {
                    console.error("Erro ao carregar dados:", err);
                } finally {
                    setLoading(false);
                }
            }

            async function fetchAgenda() {
                const dateStr = currentDate.toISOString().split('T')[0];
                const { data } = await client.from('agenda').select('*').eq('data', dateStr);
                setAgenda(data || []);
            }

            async function handleSave() {
                const dateStr = currentDate.toISOString().split('T')[0];
                const payload = { ...form, data: dateStr };
                
                try {
                    if (editingItem) {
                        await client.from('agenda').update(payload).eq('id', editingItem.id);
                    } else {
                        await client.from('agenda').insert([payload]);
                    }
                    setModalOpen(false);
                    setEditingItem(null);
                    fetchAgenda();
                } catch (e) {
                    alert("Erro ao gravar no banco. Verifique as permissões.");
                }
            }

            async function handleDelete(id) {
                if (confirm('Excluir este agendamento?')) {
                    await client.from('agenda').delete().eq('id', id);
                    setModalOpen(false);
                    fetchAgenda();
                }
            }

            // Horários das 08:00 às 22:00
            const timeSlots = useMemo(() => {
                const slots = [];
                for (let i = 8; i <= 21; i++) {
                    slots.push(`${i.toString().padStart(2, '0')}:00`);
                    slots.push(`${i.toString().padStart(2, '0')}:30`);
                }
                slots.push("22:00");
                return slots;
            }, []);

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen text-[#c9973a]">
                    <div className="text-3xl font-black italic mb-2 tracking-tighter">BARBER<span className="text-white">FLOW</span></div>
                    <div className="animate-pulse text-[10px] font-bold uppercase tracking-[0.3em]">Conectando com a nova chave...</div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 relative bg-[#0a0a0a]">
                    {/* Header */}
                    <header className="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0a] z-40 border-b border-white/5 shadow-lg">
                        <div className="font-black italic text-xl">BARBER<span className="text-[#c9973a]">FLOW</span></div>
                        <button onClick={() => {
                            setEditingItem(null);
                            setForm({
                                cliente: '', whatsapp: '', barbeiro_nome: barbeiros[0]?.nome || '',
                                servico_nome: servicos[0]?.nome || '', hora: '09:00', duracao: 30, tipo: 'appt'
                            });
                            setModalOpen(true);
                        }} className="gold-gradient text-black px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-[#c9973a]/20">
                            Novo Agendamento +
                        </button>
                    </header>

                    {/* Menu de Navegação */}
                    <nav className="flex px-4 border-b border-white/5 bg-[#141414]">
                        {[
                            { id: 'agenda', icon: 'Calendar', label: 'Agenda' },
                            { id: 'equipe', icon: 'Users', label: 'Equipe' },
                            { id: 'servicos', icon: 'Scissors', label: 'Serviços' }
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setView(tab.id)} className={`flex-1 py-4 flex flex-col items-center gap-1 transition-all ${view === tab.id ? 'text-[#c9973a] border-b-2 border-[#c9973a]' : 'text-zinc-600'}`}>
                                <Icon name={tab.icon} size={18} />
                                <span className="text-[9px] font-black uppercase tracking-widest">{tab.label}</span>
                            </button>
                        ))}
                    </nav>

                    <main className="p-4">
                        {view === 'agenda' && (
                            <div className="animate-in fade-in duration-500">
                                {/* Seletor de Data */}
                                <div className="flex items-center justify-between mb-6 bg-[#141414] p-3 rounded-2xl border border-white/5 shadow-md">
                                    <button onClick={() => {
                                        const d = new Date(currentDate); d.setDate(d.getDate() - 1); setCurrentDate(d);
                                    }} className="text-[#c9973a] p-2 bg-white/5 rounded-full"><Icon name="ChevronLeft" /></button>
                                    <div className="text-center">
                                        <div className="text-[10px] font-black text-[#c9973a] uppercase tracking-widest">{currentDate.toLocaleDateString('pt-BR', { weekday: 'long' })}</div>
                                        <div className="font-bold text-sm">{currentDate.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long' })}</div>
                                    </div>
                                    <button onClick={() => {
                                        const d = new Date(currentDate); d.setDate(d.getDate() + 1); setCurrentDate(d);
                                    }} className="text-[#c9973a] p-2 bg-white/5 rounded-full"><Icon name="ChevronRight" /></button>
                                </div>

                                {/* Grade de Horários */}
                                <div className="flex bg-[#141414] rounded-3xl border border-white/5 overflow-hidden shadow-2xl">
                                    <div className="w-14 bg-black/20 border-r border-white/5">
                                        <div className="h-10 border-b border-white/5"></div>
                                        {timeSlots.map(t => (
                                            <div key={t} className="h-16 flex items-center justify-center text-[10px] font-bold text-zinc-600 border-b border-white/5">{t}</div>
                                        ))}
                                    </div>
                                    <div className="flex-1 overflow-x-auto no-scrollbar flex">
                                        {barbeiros.length === 0 ? (
                                            <div className="flex items-center justify-center w-full p-10 text-center text-zinc-600 text-[10px] font-black uppercase tracking-widest leading-relaxed">
                                                Acesse a aba EQUIPE para cadastrar profissionais e libertar a agenda.
                                            </div>
                                        ) : (
                                            barbeiros.map(b => (
                                                <div key={b.id} className="min-w-[160px] flex-1 border-r border-white/5 relative bg-white/[0.01]">
                                                    <div className="h-10 flex items-center justify-center text-[10px] font-black text-[#c9973a] border-b border-[#c9973a]/20 uppercase tracking-tighter">{b.nome}</div>
                                                    <div className="relative h-[1856px]">
                                                        {agenda.filter(a => a.barbeiro_nome === b.nome).map(item => {
                                                            const [h, m] = item.hora.split(':').map(Number);
                                                            const top = ((h - 8) * 2 + (m === 30 ? 1 : 0)) * 64;
                                                            return (
                                                                <div key={item.id} onClick={() => { setEditingItem(item); setForm({...item}); setModalOpen(true); }} className={`absolute inset-x-1 p-3 rounded-xl text-[10px] font-black shadow-lg z-10 transition-transform active:scale-95 ${item.tipo === 'block' ? 'slot-blocked' : 'slot-active text-white'}`} style={{ top: `${top}px`, height: '60px' }}>
                                                                    <div className="truncate uppercase tracking-tighter">{item.tipo === 'block' ? '🚫 Bloqueado' : item.cliente}</div>
                                                                    {item.tipo === 'appt' && <div className="opacity-60 text-[8px] mt-1 font-bold">{item.servico_nome}</div>}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'equipe' && (
                            <div className="space-y-4 max-w-sm mx-auto animate-in slide-in-from-bottom-4">
                                <h3 className="font-black italic text-lg text-[#c9973a] flex items-center gap-2"><Icon name="Users" /> EQUIPE</h3>
                                <div className="space-y-3">
                                    {barbeiros.map(b => (
                                        <div key={b.id} className="card-dark p-4 rounded-2xl flex justify-between items-center shadow-lg">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 bg-[#c9973a]/10 rounded-full flex items-center justify-center text-[#c9973a] font-black uppercase text-xs border border-[#c9973a]/20">{b.nome[0]}</div>
                                                <span className="font-bold text-sm">{b.nome}</span>
                                            </div>
                                            <button onClick={async () => { if(confirm('Excluir este barbeiro?')){ await client.from('barbeiros').delete().eq('id', b.id); fetchInitialData(); } }} className="text-red-900 p-2"><Icon name="Trash2" size={18}/></button>
                                        </div>
                                    ))}
                                </div>
                                <div className="card-dark p-2 rounded-2xl flex gap-2 border-[#c9973a]/20 bg-black/40">
                                    <input id="addB" placeholder="Nome do Barbeiro" className="flex-1 bg-transparent border-none p-3 text-sm font-bold placeholder:text-zinc-700" />
                                    <button onClick={async () => {
                                        const val = document.getElementById('addB').value;
                                        if(val) { await client.from('barbeiros').insert([{nome: val}]); fetchInitialData(); document.getElementById('addB').value = ''; }
                                    }} className="gold-gradient text-black px-5 rounded-xl font-black transition-transform active:scale-90"><Icon name="Plus" /></button>
                                </div>
                            </div>
                        )}

                        {view === 'servicos' && (
                            <div className="space-y-4 max-w-sm mx-auto animate-in slide-in-from-bottom-4">
                                <h3 className="font-black italic text-lg text-[#c9973a] flex items-center gap-2"><Icon name="Scissors" /> SERVIÇOS</h3>
                                <div className="space-y-3">
                                    {servicos.map(s => (
                                        <div key={s.id} className="card-dark p-4 rounded-2xl flex justify-between items-center shadow-lg">
                                            <div>
                                                <div className="font-bold text-sm uppercase tracking-tight">{s.nome}</div>
                                                <div className="text-[10px] font-black text-[#c9973a] tracking-widest mt-0.5">R$ {s.preco}</div>
                                            </div>
                                            <button onClick={async () => { if(confirm('Excluir este serviço?')){ await client.from('servicos').delete().eq('id', s.id); fetchInitialData(); } }} className="text-red-900 p-2"><Icon name="Trash2" size={18}/></button>
                                        </div>
                                    ))}
                                </div>
                                <div className="card-dark p-3 rounded-2xl flex flex-col gap-2 bg-black/40">
                                    <input id="addSN" placeholder="Nome do Serviço (ex: Corte)" className="bg-transparent p-2 text-sm font-bold border-b border-white/5" />
                                    <div className="flex gap-2">
                                        <input id="addSP" placeholder="Preço (ex: 50)" type="number" className="flex-1 bg-transparent p-2 text-sm font-bold" />
                                        <button onClick={async () => {
                                            const n = document.getElementById('addSN').value;
                                            const p = document.getElementById('addSP').value;
                                            if(n && p) { await client.from('servicos').insert([{nome: n, preco: p}]); fetchInitialData(); document.getElementById('addSN').value = ''; document.getElementById('addSP').value = ''; }
                                        }} className="gold-gradient text-black px-6 rounded-xl font-black uppercase text-[10px]">Adicionar</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal de Agendamento */}
                    {modalOpen && (
                        <div className="fixed inset-0 bg-black/95 z-50 flex items-end justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-[#141414] w-full max-w-md rounded-t-[3rem] p-8 border-t border-white/10 space-y-5 animate-in slide-in-from-bottom-full duration-500 shadow-[0_-20px_50px_rgba(0,0,0,0.5)]">
                                <div className="flex justify-between items-center mb-2">
                                    <h2 className="text-xl font-black text-[#c9973a] italic uppercase tracking-tighter">{editingItem ? 'Editar Registo' : 'Novo Registo'}</h2>
                                    <div className="flex bg-black/40 p-1 rounded-2xl border border-white/5">
                                        <button onClick={() => setForm({...form, tipo:'appt'})} className={`px-5 py-1.5 rounded-xl text-[9px] font-black transition-all ${form.tipo === 'appt' ? 'bg-[#c9973a] text-black shadow-lg' : 'text-zinc-600'}`}>AGENDAR</button>
                                        <button onClick={() => setForm({...form, tipo:'block'})} className={`px-5 py-1.5 rounded-xl text-[9px] font-black transition-all ${form.tipo === 'block' ? 'bg-red-600 text-white shadow-lg' : 'text-zinc-600'}`}>BLOQUEAR</button>
                                    </div>
                                </div>

                                {form.tipo === 'appt' ? (
                                    <div className="space-y-4">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-zinc-500 uppercase ml-3 tracking-[0.2em]">Nome do Cliente</label>
                                            <input className="w-full p-4 rounded-2xl font-bold text-lg" value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-zinc-500 uppercase ml-3 tracking-[0.2em]">WhatsApp (com DDD)</label>
                                            <div className="flex gap-2">
                                                <input className="flex-1 p-4 rounded-2xl font-bold" placeholder="11999999999" value={form.whatsapp} onChange={e => setForm({...form, whatsapp: e.target.value})} />
                                                {form.whatsapp && (
                                                    <button onClick={() => window.open(`https://wa.me/55${form.whatsapp.replace(/\D/g,'')}?text=Olá ${form.cliente}, confirma o seu horário na BarberFlow?`, '_blank')} className="p-4 bg-green-600/20 text-green-500 rounded-2xl border border-green-500/20 active:scale-90 transition-transform"><Icon name="Phone" /></button>
                                                )}
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black text-zinc-500 uppercase ml-3 tracking-[0.2em]">Serviço Escolhido</label>
                                            <select className="w-full p-4 rounded-2xl font-bold appearance-none bg-zinc-900 border-zinc-800" value={form.servico_nome} onChange={e => setForm({...form, servico_nome: e.target.value})}>
                                                {servicos.map(s => <option key={s.id} value={s.nome}>{s.nome.toUpperCase()} — R$ {s.preco}</option>)}
                                                {servicos.length === 0 && <option value="">Cadastre serviços primeiro</option>}
                                            </select>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="p-8 bg-red-600/5 border-2 border-dashed border-red-600/20 rounded-[2.5rem] text-center text-red-600 space-y-3">
                                        <div className="p-4 bg-red-600/10 rounded-full inline-block shadow-lg"><Icon name="Lock" size={32} /></div>
                                        <div className="text-xs font-black uppercase tracking-widest">Este horário ficará indisponível</div>
                                        <p className="text-[10px] opacity-60 font-bold italic">Ideal para pausas, almoço ou folgas.</p>
                                    </div>
                                )}

                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-zinc-500 uppercase ml-3 tracking-[0.2em]">Barbeiro</label>
                                        <select className="w-full p-4 rounded-2xl font-bold text-xs appearance-none bg-zinc-900" value={form.barbeiro_nome} onChange={e => setForm({...form, barbeiro_nome: e.target.value})}>
                                            {barbeiros.map(b => <option key={b.id} value={b.nome}>{b.nome.toUpperCase()}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-zinc-500 uppercase ml-3 tracking-[0.2em]">Horário</label>
                                        <select className="w-full p-4 rounded-2xl font-bold text-xs appearance-none bg-zinc-900" value={form.hora} onChange={e => setForm({...form, hora: e.target.value})}>
                                            {timeSlots.map(t => <option key={t} value={t}>{t}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <div className="pt-6 space-y-3">
                                    <button onClick={handleSave} className="w-full gold-gradient text-black py-5 rounded-[2rem] font-black uppercase text-sm shadow-[0_15px_40px_rgba(201,151,58,0.25)] active:scale-95 transition-all">Confirmar e Gravar</button>
                                    {editingItem && (
                                        <button onClick={() => handleDelete(editingItem.id)} className="w-full text-red-900 font-black text-[10px] uppercase tracking-widest py-2">Remover da Agenda</button>
                                    )}
                                    <button onClick={() => setModalOpen(false)} className="w-full text-zinc-700 font-black text-[10px] uppercase tracking-[0.4em] py-2">Voltar Atrás</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
