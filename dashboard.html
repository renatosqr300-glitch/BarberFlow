<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarberFlow PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; overflow-x: hidden; }
        .gold-bg { background-color: #c9973a; }
        .gold-text { color: #c9973a; }
        .tab-active { color: #c9973a; border-bottom: 2px solid #c9973a; }
        .card-dark { background-color: #121212; border: 1px solid rgba(255,255,255,0.05); }
        input::placeholder { color: rgba(255,255,255,0.3); }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="pb-24">

    <!-- Banner de Status (Substitui o erro das tuas fotos) -->
    <div id="status-bar" class="hidden fixed top-0 left-0 w-full p-2 text-[10px] font-black uppercase text-center z-[100] transition-all duration-300"></div>

    <!-- Header -->
    <header class="p-6 flex justify-between items-center bg-[#0a0a0a] sticky top-0 z-50 border-b border-white/5">
        <div class="text-2xl font-black italic tracking-tighter uppercase">BARBER<span class="gold-text">FLOW</span></div>
        <button onclick="openModal()" class="gold-bg text-black w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-[#c9973a]/20 btn-press">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </header>

    <!-- Navegação -->
    <nav class="flex bg-[#0a0a0a] border-b border-white/5 sticky top-[81px] z-40">
        <button onclick="changeTab('agenda')" id="nav-agenda" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest tab-active">Agenda</button>
        <button onclick="changeTab('equipe')" id="nav-equipe" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-gray-500">Equipa</button>
        <button onclick="changeTab('servicos')" id="nav-servicos" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-gray-500">Serviços</button>
    </nav>

    <main class="p-4 max-w-lg mx-auto" id="app-content">
        <!-- Loader inicial -->
        <div class="py-20 text-center animate-pulse font-black text-[10px] text-gray-600 tracking-[0.3em]">A carregar dados...</div>
    </main>

    <!-- Modal de Agendamento -->
    <div id="modal-agenda" class="hidden fixed inset-0 z-[100] flex items-end justify-center p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="bg-[#161616] w-full rounded-t-[3rem] p-8 border border-white/10 relative animate-in slide-in-from-bottom duration-300">
            <h3 class="text-xl font-black gold-text uppercase italic mb-6">Novo Agendamento</h3>
            <div class="space-y-4">
                <input id="form-cliente" placeholder="Nome do Cliente" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 outline-none">
                <select id="form-barbeiro" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 text-white"></select>
                <select id="form-servico" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 text-white"></select>
                <select id="form-hora" class="w-full bg-white/5 p-4 rounded-2xl border border-white/5 text-white">
                    <option value="09:00">09:00</option><option value="10:00">10:00</option><option value="11:00">11:00</option>
                    <option value="14:00">14:00</option><option value="15:00">15:00</option><option value="16:00">16:00</option>
                </select>
                <button onclick="saveAgendamento()" class="w-full gold-bg text-black py-5 rounded-2xl font-black uppercase text-xs btn-press shadow-xl">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://tnyqonofxojonofhsnph.supabase.co/rest/v1";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRueXFvbm9meG9qb25vZmhzbnBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEzODIzODAsImV4cCI6MjA1Njk1ODM4MH0.W7vGz-kSshvD_M-78E8-G-6-8-E-6-8-E-6-8-E-6-8-E-6-8";

        let currentTab = 'agenda';
        let dataStore = { barbeiros: [], servicos: [], agenda: [] };

        function showStatus(msg, isError = false) {
            const bar = document.getElementById('status-bar');
            bar.innerText = msg;
            bar.className = `fixed top-0 left-0 w-full p-2 text-[10px] font-black uppercase text-center z-[100] ${isError ? 'bg-red-600' : 'bg-green-600'}`;
            bar.classList.remove('hidden');
            setTimeout(() => bar.classList.add('hidden'), 3000);
        }

        async function api(method, table, body = null, query = '') {
            try {
                const options = {
                    method,
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${SB_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    }
                };
                if (body) options.body = JSON.stringify(body);
                const res = await fetch(`${SB_URL}/${table}${query}`, options);
                if (!res.ok) throw new Error();
                return await res.json();
            } catch (e) {
                showStatus("Erro de ligação à nuvem!", true);
                return null;
            }
        }

        async function reloadData() {
            const [b, s, a] = await Promise.all([
                api('GET', 'barbeiros', null, '?select=*&order=nome'),
                api('GET', 'servicos', null, '?select=*&order=nome'),
                api('GET', 'agenda', null, '?select=*')
            ]);
            dataStore = { barbeiros: b || [], servicos: s || [], agenda: a || [] };
            render();
        }

        function changeTab(tab) {
            currentTab = tab;
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('text-gray-500');
            });
            document.getElementById(`nav-${tab}`).classList.add('tab-active');
            render();
        }

        async function addItem(table, body) {
            showStatus("A guardar na nuvem...");
            const res = await api('POST', table, body);
            if (res) {
                showStatus("Sucesso!");
                reloadData();
            }
        }

        async function deleteItem(table, id) {
            if (!confirm("Apagar registo?")) return;
            await api('DELETE', table, null, `?id=eq.${id}`);
            reloadData();
        }

        function render() {
            const container = document.getElementById('app-content');
            
            if (currentTab === 'equipe') {
                container.innerHTML = `
                    <div class="space-y-6">
                        <h2 class="text-xl font-black uppercase italic tracking-tighter">Equipa</h2>
                        <div class="card-dark p-6 rounded-[2.5rem] space-y-4 shadow-2xl">
                            <input id="in-barbeiro" placeholder="Nome do Barbeiro" class="w-full bg-white/5 p-5 rounded-2xl outline-none border border-white/5 focus:border-[#c9973a]">
                            <button onclick="addItem('barbeiros', {nome: document.getElementById('in-barbeiro').value})" class="w-full gold-bg text-black py-4 rounded-2xl font-black uppercase text-[10px] btn-press">Adicionar Barbeiro</button>
                        </div>
                        <div class="space-y-2">
                            ${dataStore.barbeiros.map(b => `
                                <div class="card-dark p-4 rounded-2xl flex justify-between items-center">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 gold-bg rounded-xl flex items-center justify-center text-black font-black uppercase">${b.nome[0]}</div>
                                        <span class="font-bold uppercase text-sm">${b.nome}</span>
                                    </div>
                                    <button onclick="deleteItem('barbeiros', ${b.id})" class="text-red-500 opacity-30 p-2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (currentTab === 'servicos') {
                container.innerHTML = `
                    <div class="space-y-6">
                        <h2 class="text-xl font-black uppercase italic tracking-tighter text-white">Serviços</h2>
                        <div class="card-dark p-6 rounded-[2.5rem] space-y-3">
                            <input id="in-s-nome" placeholder="Nome do Serviço" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/5">
                            <input id="in-s-preco" type="number" placeholder="Preço (€)" class="w-full bg-white/5 p-4 rounded-2xl outline-none border border-white/5">
                            <button onclick="addItem('servicos', {nome: document.getElementById('in-s-nome').value, preco: parseFloat(document.getElementById('in-s-preco').value)})" class="w-full gold-bg text-black py-4 rounded-2xl font-black uppercase text-[10px] btn-press">Salvar Serviço</button>
                        </div>
                        <div class="grid gap-2">
                            ${dataStore.servicos.map(s => `
                                <div class="card-dark p-4 rounded-2xl flex justify-between items-center">
                                    <div><div class="font-bold uppercase text-sm">${s.nome}</div><div class="gold-text font-black text-xs">${s.preco}€</div></div>
                                    <button onclick="deleteItem('servicos', ${s.id})" class="text-red-500 opacity-30 p-2">Apagar</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="bg-[#161616] p-4 rounded-3xl border border-white/5 flex items-center justify-between mb-6">
                        <button class="gold-text"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                        <div class="text-center"><div class="text-[9px] font-black gold-text uppercase">Hoje</div><div class="text-lg font-black italic uppercase">8 de Março</div></div>
                        <button class="gold-text"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                    </div>
                    ${dataStore.barbeiros.length === 0 ? 
                        `<div class="py-20 text-center opacity-20 font-black text-xs uppercase tracking-widest">Adicione barbeiros em Equipa</div>` :
                        `<div class="space-y-4">
                            ${dataStore.barbeiros.map(b => `
                                <div class="card-dark p-5 rounded-[2rem]">
                                    <div class="text-[10px] font-black gold-text uppercase mb-4 border-b border-white/5 pb-2 text-center">${b.nome}</div>
                                    <div class="space-y-2">
                                        ${dataStore.agenda.filter(a => a.barbeiro_nome === b.nome).length === 0 ? 
                                            `<div class="text-[8px] text-center text-gray-700 uppercase font-black">Livre</div>` :
                                            dataStore.agenda.filter(a => a.barbeiro_nome === b.nome).map(a => `
                                                <div class="bg-white/5 p-3 rounded-xl border-l-4 border-[#c9973a] flex justify-between items-center">
                                                    <div><div class="font-black uppercase text-[10px]">${a.cliente}</div><div class="text-[8px] opacity-40">${a.hora} - ${a.servico_nome}</div></div>
                                                    <button onclick="deleteItem('agenda', ${a.id})" class="text-red-500/20 text-[8px] uppercase font-black">X</button>
                                                </div>
                                            `).join('')
                                        }
                                    </div>
                                </div>
                            `).join('')}
                        </div>`
                    }
                `;
            }
        }

        function openModal() {
            document.getElementById('form-barbeiro').innerHTML = dataStore.barbeiros.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
            document.getElementById('form-servico').innerHTML = dataStore.servicos.map(s => `<option value="${s.nome}">${s.nome}</option>`).join('');
            document.getElementById('modal-agenda').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal-agenda').classList.add('hidden'); }

        async function saveAgendamento() {
            const body = {
                cliente: document.getElementById('form-cliente').value,
                barbeiro_nome: document.getElementById('form-barbeiro').value,
                servico_nome: document.getElementById('form-servico').value,
                hora: document.getElementById('form-hora').value,
                data: '2026-03-08'
            };
            if(!body.cliente) return;
            await addItem('agenda', body);
            closeModal();
        }

        // Início
        reloadData();
    </script>
</body>
</html>
