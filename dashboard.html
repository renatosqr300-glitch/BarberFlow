<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow — Gerenciamento</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --gold: #c9973a;
            --gold-d: rgba(201,151,58,0.15);
            --text: #f0ece4;
            --muted: #888;
            --border: rgba(255,255,255,0.08);
            --radius: 12px;
            --danger: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 30px; }

        header {
            padding: 15px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-family: 'Bebas Neue', cursive; font-size: 1.6rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        /* NAVEGAÇÃO PRINCIPAL */
        .nav-tabs {
            display: flex;
            background: var(--card);
            padding: 5px 10px;
            gap: 5px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }

        .tab-btn {
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-weight: 600;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); border-radius: 0; }

        .container { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* CALENDÁRIO */
        .date-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card);
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .btn-arrow { background: none; border: none; color: var(--gold); font-size: 1.2rem; cursor: pointer; padding: 0 10px; }
        .current-date { font-weight: 700; font-size: 0.9rem; text-transform: capitalize; }

        /* GRADE DA AGENDA */
        .agenda-wrapper {
            display: flex;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow-x: auto;
            position: relative;
        }

        .time-col { min-width: 60px; border-right: 1px solid var(--border); background: #0d0d0d; }
        .time-slot-label {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--muted);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .profs-container { display: flex; flex: 1; }
        .prof-column { min-width: 160px; flex: 1; border-right: 1px solid var(--border); position: relative; }
        .prof-header {
            padding: 10px; text-align: center; font-weight: bold; font-size: 0.75rem;
            background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); color: var(--gold);
        }

        .slots-area { height: calc(12 * 60px); position: relative; }
        
        .appointment {
            position: absolute;
            left: 4px; right: 4px;
            background: var(--gold-d);
            border-left: 3px solid var(--gold);
            border-radius: 6px;
            padding: 6px;
            font-size: 0.75rem;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .appointment:active { transform: scale(0.98); background: rgba(201,151,58,0.3); }

        /* MODAIS */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card); width: 100%; max-width: 380px;
            padding: 25px; border-radius: var(--radius); border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; }
        input, select {
            width: 100%; padding: 12px; background: #1c1c1c; border: 1px solid var(--border);
            border-radius: 8px; color: #fff; outline: none; font-size: 1rem;
        }

        .btn-gold { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; }
        .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; }
        .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; }

        /* ABA PLANO */
        .plan-card {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid var(--gold);
            padding: 25px;
            border-radius: var(--radius);
            text-align: center;
        }
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            background: rgba(0, 255, 100, 0.1); color: #00ff64; font-size: 0.7rem; font-weight: bold; margin-bottom: 10px;
        }

    </style>
</head>
<body>

<header>
    <div class="logo">BARBER<span>FLOW</span></div>
    <button onclick="openModal('new')" style="background:var(--gold); border:none; padding:8px 15px; border-radius:6px; font-weight:bold; font-size:0.75rem">NOVO +</button>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showView('agenda')">📅 Agenda</button>
    <button class="tab-btn" onclick="showView('equipe')">👥 Equipe</button>
    <button class="tab-btn" onclick="showView('servicos')">✂️ Serviços</button>
    <button class="tab-btn" onclick="showView('plano')">💰 Plano</button>
</div>

<div class="container">
    
    <!-- AGENDA -->
    <div id="view-agenda" class="view active">
        <div class="date-control">
            <button class="btn-arrow" onclick="changeDate(-1)">❮</button>
            <div class="current-date" id="displayDate">Sexta, 06 de Março</div>
            <button class="btn-arrow" onclick="changeDate(1)">❯</button>
        </div>

        <div class="agenda-wrapper">
            <div class="time-col" id="timeLabels"></div>
            <div class="profs-container" id="profsColumns"></div>
        </div>
    </div>

    <!-- EQUIPE -->
    <div id="view-equipe" class="view">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px">Equipe</h2>
        <div id="prof-list"></div>
        <div class="form-group" style="margin-top:20px">
            <input type="text" id="new-prof-name" placeholder="Nome do Barbeiro">
            <button class="btn-gold" style="margin-top:10px" onclick="addBarbeiro()">Adicionar Barbeiro</button>
        </div>
    </div>

    <!-- SERVIÇOS -->
    <div id="view-servicos" class="view">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px">Meus Serviços</h2>
        <div id="service-list"></div>
        <div class="form-group" style="margin-top:20px">
            <input type="text" id="new-service-name" placeholder="Nome do Serviço">
            <input type="number" id="new-service-price" placeholder="Preço R$" style="margin-top:10px">
            <button class="btn-gold" style="margin-top:10px" onclick="addServico()">Salvar Serviço</button>
        </div>
    </div>

    <!-- PLANO -->
    <div id="view-plano" class="view">
        <div class="plan-card">
            <div class="status-badge">ASSINATURA ATIVA</div>
            <h1 style="font-family:'Bebas Neue'; font-size:2rem; color:var(--gold)">BARBERFLOW PRO</h1>
            <p style="margin: 15px 0; color:var(--muted); font-size:0.9rem">Próximo vencimento: <b>02/04/2026</b></p>
            <div style="font-size:1.5rem; font-weight:bold; margin-bottom:20px">R$ 20,90 <span style="font-size:0.8rem; color:var(--muted)">/mês</span></div>
            <button class="btn-gold">ALTERAR CARTÃO</button>
            <button class="btn-outline">VER HISTÓRICO</button>
        </div>
    </div>

</div>

<!-- MODAL: AGENDAMENTO (NOVO / EDITAR) -->
<div class="modal" id="modalAppt">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-bottom:20px; font-family:'Bebas Neue'">Novo Agendamento</h3>
        <input type="hidden" id="editIndex">
        
        <div class="form-group">
            <label>Cliente</label>
            <input type="text" id="appt-client">
        </div>
        <div class="form-group">
            <label>Barbeiro</label>
            <select id="appt-prof"></select>
        </div>
        <div class="form-group">
            <label>Horário</label>
            <input type="time" id="appt-time">
        </div>

        <button class="btn-gold" onclick="saveAppointment()">Salvar</button>
        <button id="btnDelete" class="btn-danger" style="display:none" onclick="deleteAppointment()">Excluir Agendamento</button>
        <button class="btn-outline" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script>
    let currentDate = new Date();
    let barbeiros = ['Renato', 'João'];
    let servicos = [{ nome: 'Corte Social', preco: 35 }];
    let agendamentos = [
        { id: 1, cliente: 'Gabriel', prof: 'Renato', hora: '09:00' },
        { id: 2, cliente: 'Lucas', prof: 'Renato', hora: '10:30' }
    ];

    function showView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`view-${viewName}`).classList.add('active');
        const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.innerText.toLowerCase().includes(viewName));
        if(btn) btn.classList.add('active');
        
        if(viewName === 'agenda') renderAgenda();
        if(viewName === 'equipe') renderEquipe();
        if(viewName === 'servicos') renderServicos();
    }

    // AGENDA
    function renderAgenda() {
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('displayDate').innerText = currentDate.toLocaleDateString('pt-BR', options);

        const timeLabels = document.getElementById('timeLabels');
        timeLabels.innerHTML = '';
        for(let h=8; h<=20; h++) {
            timeLabels.innerHTML += `<div class="time-slot-label">${h}:00</div>`;
        }

        const columns = document.getElementById('profsColumns');
        columns.innerHTML = barbeiros.map(b => `
            <div class="prof-column">
                <div class="prof-header">${b}</div>
                <div class="slots-area">
                    ${renderAppointmentsFor(b)}
                </div>
            </div>
        `).join('');
    }

    function renderAppointmentsFor(prof) {
        return agendamentos
            .filter(a => a.prof === prof)
            .map((a, index) => {
                const [h, m] = a.hora.split(':').map(Number);
                const top = (h - 8) * 60 + m; 
                return `
                    <div class="appointment" style="top: ${top}px; height: 50px;" onclick="openModal('edit', ${agendamentos.indexOf(a)})">
                        <b>${a.cliente}</b><br>${a.hora}
                    </div>
                `;
            }).join('');
    }

    function changeDate(days) {
        currentDate.setDate(currentDate.getDate() + days);
        renderAgenda();
    }

    // MODAL LOGIC
    function openModal(mode, index = null) {
        const select = document.getElementById('appt-prof');
        select.innerHTML = barbeiros.map(b => `<option>${b}</option>`).join('');
        
        const modal = document.getElementById('modalAppt');
        const btnDel = document.getElementById('btnDelete');
        const title = document.getElementById('modalTitle');
        
        if(mode === 'edit') {
            const a = agendamentos[index];
            document.getElementById('appt-client').value = a.cliente;
            document.getElementById('appt-prof').value = a.prof;
            document.getElementById('appt-time').value = a.hora;
            document.getElementById('editIndex').value = index;
            btnDel.style.display = 'block';
            title.innerText = "Editar Agendamento";
        } else {
            document.getElementById('appt-client').value = '';
            document.getElementById('appt-time').value = '10:00';
            document.getElementById('editIndex').value = '-1';
            btnDel.style.display = 'none';
            title.innerText = "Novo Agendamento";
        }
        
        modal.classList.add('active');
    }

    function closeModal() { document.getElementById('modalAppt').classList.remove('active'); }

    function saveAppointment() {
        const index = parseInt(document.getElementById('editIndex').value);
        const data = {
            cliente: document.getElementById('appt-client').value,
            prof: document.getElementById('appt-prof').value,
            hora: document.getElementById('appt-time').value
        };

        if(!data.cliente) return;

        if(index > -1) agendamentos[index] = data;
        else agendamentos.push(data);

        closeModal();
        renderAgenda();
    }

    function deleteAppointment() {
        const index = parseInt(document.getElementById('editIndex').value);
        if(index > -1) {
            agendamentos.splice(index, 1);
            closeModal();
            renderAgenda();
        }
    }

    // LISTAS (EQUIPE / SERVIÇOS)
    function renderEquipe() {
        const list = document.getElementById('prof-list');
        list.innerHTML = barbeiros.map((b, i) => `
            <div style="background:var(--card); padding:15px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border)">
                <span>${b}</span>
                <button onclick="barbeiros.splice(${i},1); renderEquipe();" style="color:var(--danger); background:none; border:none; font-weight:bold">Remover</button>
            </div>
        `).join('');
    }

    function addBarbeiro() {
        const val = document.getElementById('new-prof-name').value;
        if(val) { barbeiros.push(val); document.getElementById('new-prof-name').value = ''; renderEquipe(); }
    }

    function renderServicos() {
        const list = document.getElementById('service-list');
        list.innerHTML = servicos.map((s, i) => `
            <div style="background:var(--card); padding:15px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border)">
                <div><b>${s.nome}</b><br><span style="color:var(--gold)">R$ ${s.preco}</span></div>
                <button onclick="servicos.splice(${i},1); renderServicos();" style="color:var(--danger); background:none; border:none; font-weight:bold">Remover</button>
            </div>
        `).join('');
    }

    function addServico() {
        const n = document.getElementById('new-service-name').value;
        const p = document.getElementById('new-service-price').value;
        if(n && p) { servicos.push({nome:n, preco:p}); renderServicos(); }
    }

    // INICIAR
    renderAgenda();
</script>

</body>
</html>
