<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow — Painel Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --gold: #c9973a;
            --gold-d: rgba(201,151,58,0.1);
            --text: #f0ece4;
            --muted: #888;
            --border: rgba(255,255,255,0.08);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 20px; }

        header {
            padding: 15px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-family: 'Bebas Neue', cursive; font-size: 1.6rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        /* NAV BAR */
        .nav-tabs {
            display: flex;
            background: var(--card);
            padding: 5px 10px;
            gap: 5px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }

        .tab-btn {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
        }

        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); border-radius: 0; }

        .container { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* CONTROLES DA AGENDA */
        .date-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card);
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .btn-arrow { background: none; border: none; color: var(--gold); font-size: 1.2rem; padding: 0 15px; cursor: pointer; }
        .current-date { font-weight: 700; font-size: 0.9rem; text-transform: capitalize; }

        /* GRID DA AGENDA */
        .agenda-wrapper {
            display: flex;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow-x: auto;
            position: relative;
        }

        /* Coluna de Horários */
        .time-col {
            min-width: 60px;
            border-right: 1px solid var(--border);
            background: #0d0d0d;
        }

        .time-slot-label {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--muted);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        /* Colunas de Barbeiros */
        .profs-container { display: flex; flex: 1; }
        .prof-column {
            min-width: 160px;
            flex: 1;
            border-right: 1px solid var(--border);
            position: relative;
        }

        .prof-header {
            padding: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            color: var(--gold);
        }

        .slots-area { height: calc(11 * 60px); position: relative; } /* 11 horas de trabalho */
        
        .appointment {
            position: absolute;
            left: 5px; right: 5px;
            background: var(--gold-d);
            border-left: 3px solid var(--gold);
            border-radius: 4px;
            padding: 5px;
            font-size: 0.75rem;
            overflow: hidden;
            z-index: 10;
        }

        /* MODAL */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card); width: 100%; max-width: 400px;
            padding: 25px; border-radius: var(--radius); border: 1px solid var(--border);
        }

        /* FORMULÁRIOS */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; }
        input, select {
            width: 100%; padding: 12px; background: #1c1c1c; border: 1px solid var(--border);
            border-radius: 8px; color: #fff; outline: none;
        }

        .btn-add {
            background: var(--gold); color: #000; border: none;
            padding: 12px; border-radius: 8px; font-weight: 700;
            width: 100%; cursor: pointer; margin-top: 10px;
        }

        .btn-secondary { background: none; color: var(--muted); border: none; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">BARBER<span>FLOW</span></div>
    <button onclick="openModal()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:6px; font-weight:bold; font-size:0.8rem">+ NOVO</button>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showView('agenda')">📅 Agenda</button>
    <button class="tab-btn" onclick="showView('equipe')">👥 Equipe</button>
    <button class="tab-btn" onclick="showView('servicos')">✂️ Serviços</button>
    <button class="tab-btn" onclick="showView('financeiro')">💰 Plano</button>
</div>

<div class="container">
    
    <!-- VIEW: AGENDA -->
    <div id="view-agenda" class="view active">
        <div class="date-control">
            <button class="btn-arrow" onclick="changeDate(-1)">❮</button>
            <div class="current-date" id="displayDate">Sábado, 07 de Março</div>
            <button class="btn-arrow" onclick="changeDate(1)">❯</button>
        </div>

        <div class="agenda-wrapper">
            <div class="time-col" id="timeLabels"></div>
            <div class="profs-container" id="profsColumns"></div>
        </div>
    </div>

    <!-- VIEW: EQUIPE -->
    <div id="view-equipe" class="view">
        <h2 style="font-family: 'Bebas Neue'; margin-bottom: 20px;">Minha Equipe</h2>
        <div id="prof-list"></div>
        <div class="form-group" style="margin-top:20px">
            <input type="text" id="new-prof-name" placeholder="Nome do novo barbeiro">
            <button class="btn-add" onclick="addBarbeiro()">Adicionar à Equipe</button>
        </div>
    </div>

    <!-- VIEW: SERVIÇOS -->
    <div id="view-servicos" class="view">
        <h2 style="font-family: 'Bebas Neue'; margin-bottom: 20px;">Serviços e Preços</h2>
        <div id="service-list"></div>
        <div class="form-group" style="margin-top:20px">
            <input type="text" id="new-service-name" placeholder="Nome do serviço">
            <input type="number" id="new-service-price" placeholder="Preço R$" style="margin-top:10px">
            <button class="btn-add" onclick="addServico()">Salvar Novo Serviço</button>
        </div>
    </div>

</div>

<!-- MODAL: NOVO AGENDAMENTO -->
<div class="modal" id="modalAppt">
    <div class="modal-content">
        <h3 style="margin-bottom:20px; font-family:'Bebas Neue'; letter-spacing:1px">Novo Agendamento</h3>
        <div class="form-group">
            <label>Cliente</label>
            <input type="text" id="appt-client" placeholder="Nome do cliente">
        </div>
        <div class="form-group">
            <label>Barbeiro</label>
            <select id="appt-prof"></select>
        </div>
        <div class="form-group">
            <label>Horário</label>
            <input type="time" id="appt-time" value="10:00">
        </div>
        <button class="btn-add" onclick="saveAppointment()">Confirmar</button>
        <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script>
    // ESTADO DO APP
    let currentDate = new Date();
    let barbeiros = ['Renato', 'João'];
    let servicos = [{ nome: 'Corte Social', preco: 35 }];
    let agendamentos = [
        { cliente: 'Gabriel', prof: 'Renato', hora: '10:00', duracao: 60 }
    ];

    function showView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`view-${viewName}`).classList.add('active');
        event.currentTarget.classList.add('active');
        if(viewName === 'agenda') renderAgenda();
        if(viewName === 'equipe') renderList('prof-list', barbeiros, removerBarbeiro);
        if(viewName === 'servicos') renderServices();
    }

    // LÓGICA DA AGENDA
    function renderAgenda() {
        // Renderizar Datas
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('displayDate').innerText = currentDate.toLocaleDateString('pt-BR', options);

        // Renderizar Horários (09h às 20h)
        const timeLabels = document.getElementById('timeLabels');
        timeLabels.innerHTML = '';
        for(let h=9; h<=20; h++) {
            timeLabels.innerHTML += `<div class="time-slot-label">${h}:00</div>`;
        }

        // Renderizar Colunas de Barbeiros
        const columns = document.getElementById('profsColumns');
        columns.innerHTML = barbeiros.map(b => `
            <div class="prof-column">
                <div class="prof-header">${b}</div>
                <div class="slots-area" id="slots-${b}">
                    ${renderAppointmentsFor(b)}
                </div>
            </div>
        `).join('');
    }

    function renderAppointmentsFor(prof) {
        return agendamentos
            .filter(a => a.prof === prof)
            .map(a => {
                const [h, m] = a.hora.split(':').map(Number);
                const top = (h - 9) * 60 + m; // Calcula posição baseada no horário
                return `
                    <div class="appointment" style="top: ${top}px; height: 50px;">
                        <b>${a.cliente}</b><br>${a.hora}
                    </div>
                `;
            }).join('');
    }

    function changeDate(days) {
        currentDate.setDate(currentDate.getDate() + days);
        renderAgenda();
    }

    // GERENCIAMENTO
    function renderList(id, array, delFn) {
        const el = document.getElementById(id);
        el.innerHTML = array.map((item, i) => `
            <div style="background:var(--card); padding:12px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; border:1px solid var(--border)">
                <span>${typeof item === 'string' ? item : item.nome}</span>
                <button onclick="${delFn.name}(${i})" style="color:#ff4444; background:none; border:none; font-weight:bold">Remover</button>
            </div>
        `).join('');
    }

    function renderServices() {
        const el = document.getElementById('service-list');
        el.innerHTML = servicos.map((s, i) => `
            <div style="background:var(--card); padding:12px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; border:1px solid var(--border)">
                <div><b>${s.nome}</b> <br> <span style="color:var(--gold)">R$ ${s.preco}</span></div>
                <button onclick="removerServico(${i})" style="color:#ff4444; background:none; border:none; font-weight:bold">Remover</button>
            </div>
        `).join('');
    }

    function addBarbeiro() {
        const val = document.getElementById('new-prof-name').value;
        if(val) { barbeiros.push(val); document.getElementById('new-prof-name').value = ''; renderList('prof-list', barbeiros, removerBarbeiro); }
    }
    function removerBarbeiro(i) { barbeiros.splice(i,1); renderList('prof-list', barbeiros, removerBarbeiro); }

    function addServico() {
        const n = document.getElementById('new-service-name').value;
        const p = document.getElementById('new-service-price').value;
        if(n && p) { servicos.push({nome:n, preco:p}); renderServices(); }
    }
    function removerServico(i) { servicos.splice(i,1); renderServices(); }

    // MODAL
    function openModal() {
        const select = document.getElementById('appt-prof');
        select.innerHTML = barbeiros.map(b => `<option>${b}</option>`).join('');
        document.getElementById('modalAppt').classList.add('active');
    }
    function closeModal() { document.getElementById('modalAppt').classList.remove('active'); }

    function saveAppointment() {
        const cliente = document.getElementById('appt-client').value;
        const prof = document.getElementById('appt-prof').value;
        const hora = document.getElementById('appt-time').value;
        if(cliente) {
            agendamentos.push({ cliente, prof, hora });
            closeModal();
            renderAgenda();
        }
    }

    // Inicializar
    renderAgenda();
</script>

</body>
</html>
