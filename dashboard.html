<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow — Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --gold: #c9973a;
            --text: #f0ece4;
            --muted: #888;
            --border: rgba(255,255,255,0.08);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 80px; }

        /* HEADER */
        header {
            padding: 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        /* NAV BAR */
        .nav-tabs {
            display: flex;
            background: var(--card);
            padding: 10px;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--gold);
            color: #000;
        }

        /* CONTENT SCREENS */
        .container { padding: 20px; max-width: 1000px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* AGENDA GRID */
        .agenda-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .prof-cols { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .col { background: rgba(255,255,255,0.02); border-radius: var(--radius); padding: 10px; min-height: 400px; border: 1px solid var(--border); }
        .col-title { text-align: center; font-size: 0.8rem; font-weight: 700; color: var(--gold); margin-bottom: 15px; text-transform: uppercase; }

        .appt-card {
            background: var(--card);
            border-left: 3px solid var(--gold);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        /* FORMS & LISTS */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
        input, select {
            width: 100%; padding: 12px; background: #1c1c1c; border: 1px solid var(--border);
            border-radius: 8px; color: #fff; outline: none;
        }

        .list-item {
            background: var(--card);
            padding: 15px;
            border-radius: var(--radius);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .btn-add {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
        }

        .btn-del { color: #ff4444; background: none; border: none; font-weight: bold; padding: 5px; }

    </style>
</head>
<body>

<header>
    <div class="logo">BARBER<span>FLOW</span></div>
    <div style="font-size: 0.8rem; color: var(--gold)">Renato Admin</div>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showView('agenda')">📅 Agenda</button>
    <button class="tab-btn" onclick="showView('equipe')">👥 Equipe</button>
    <button class="tab-btn" onclick="showView('servicos')">✂️ Serviços</button>
    <button class="tab-btn" onclick="showView('financeiro')">💰 Plano</button>
</div>

<div class="container">
    
    <!-- VIEW: AGENDA -->
    <div id="view-agenda" class="view active">
        <div class="agenda-header">
            <h2 style="font-family: 'Bebas Neue'">Hoje, 07 Mar</h2>
            <button class="btn-add" style="width: auto; margin: 0">+ Novo</button>
        </div>
        <div class="prof-cols" id="cols-container">
            <!-- Colunas de Barbeiros entram aqui via JS -->
        </div>
    </div>

    <!-- VIEW: EQUIPE -->
    <div id="view-equipe" class="view">
        <h2 style="font-family: 'Bebas Neue'; margin-bottom: 20px;">Gerenciar Barbeiros</h2>
        <div id="prof-list"></div>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        <div class="form-group">
            <label>Nome do Barbeiro</label>
            <input type="text" id="new-prof-name" placeholder="Ex: Rodrigo Silva">
        </div>
        <button class="btn-add" onclick="addBarbeiro()">Adicionar Barbeiro</button>
    </div>

    <!-- VIEW: SERVIÇOS -->
    <div id="view-servicos" class="view">
        <h2 style="font-family: 'Bebas Neue'; margin-bottom: 20px;">Preços e Serviços</h2>
        <div id="service-list"></div>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        <div class="form-group">
            <label>Nome do Serviço</label>
            <input type="text" id="new-service-name" placeholder="Ex: Corte Navalhado">
        </div>
        <div class="form-group">
            <label>Preço (R$)</label>
            <input type="number" id="new-service-price" placeholder="40">
        </div>
        <button class="btn-add" onclick="addServico()">Adicionar Serviço</button>
    </div>

    <!-- VIEW: FINANCEIRO -->
    <div id="view-financeiro" class="view">
        <div style="background: var(--gold-d); padding: 20px; border-radius: var(--radius); border: 1px solid var(--gold);">
            <h2 style="color: var(--gold)">Assinatura Ativa</h2>
            <p style="font-size: 0.9rem; margin: 10px 0;">Seu plano mensal vence em 22 dias.</p>
            <button class="btn-add">Gerenciar Pagamento</button>
        </div>
    </div>

</div>

<script>
    // ESTADO INICIAL (O que vai pro Supabase depois)
    let barbeiros = ['Carlos', 'Renato', 'Marcos'];
    let servicos = [
        { nome: 'Corte Social', preco: 35 },
        { nome: 'Barba', preco: 25 },
        { nome: 'Combo', preco: 55 }
    ];

    function showView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(`view-${viewName}`).classList.add('active');
        event.currentTarget.classList.add('active');

        if(viewName === 'agenda') renderAgenda();
        if(viewName === 'equipe') renderEquipe();
        if(viewName === 'servicos') renderServicos();
    }

    function renderAgenda() {
        const container = document.getElementById('cols-container');
        container.innerHTML = barbeiros.map(b => `
            <div class="col">
                <div class="col-title">${b}</div>
                <div class="appt-card">
                    <div style="font-weight:bold">Gabriel (10:00)</div>
                    <div style="font-size:0.7rem; color:var(--muted)">Corte Social</div>
                </div>
            </div>
        `).join('');
    }

    function renderEquipe() {
        const list = document.getElementById('prof-list');
        list.innerHTML = barbeiros.map((b, index) => `
            <div class="list-item">
                <span>${b}</span>
                <button class="btn-del" onclick="removerBarbeiro(${index})">Remover</button>
            </div>
        `).join('');
    }

    function addBarbeiro() {
        const name = document.getElementById('new-prof-name').value;
        if(name) {
            barbeiros.push(name);
            document.getElementById('new-prof-name').value = '';
            renderEquipe();
        }
    }

    function removerBarbeiro(index) {
        barbeiros.splice(index, 1);
        renderEquipe();
    }

    function renderServicos() {
        const list = document.getElementById('service-list');
        list.innerHTML = servicos.map((s, index) => `
            <div class="list-item">
                <div>
                    <div style="font-weight:bold">${s.nome}</div>
                    <div style="color:var(--gold)">R$ ${s.preco}</div>
                </div>
                <button class="btn-del" onclick="removerServico(${index})">Remover</button>
            </div>
        `).join('');
    }

    function addServico() {
        const nome = document.getElementById('new-service-name').value;
        const preco = document.getElementById('new-service-price').value;
        if(nome && preco) {
            servicos.push({ nome, preco });
            document.getElementById('new-service-name').value = '';
            document.getElementById('new-service-price').value = '';
            renderServicos();
        }
    }

    function removerServico(index) {
        servicos.splice(index, 1);
        renderServicos();
    }

    // Iniciar
    renderAgenda();
</script>

</body>
</html>
