<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow — Gestão Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --gold: #c9973a;
            --gold-d: rgba(201,151,58,0.15);
            --text: #f0ece4;
            --muted: #888;
            --border: rgba(255,255,255,0.08);
            --radius: 12px;
            --danger: #ff4444;
            --blocked: #2a2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 30px; }

        header {
            padding: 15px 20px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-family: 'Bebas Neue', cursive; font-size: 1.6rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        .nav-tabs {
            display: flex;
            background: var(--card);
            padding: 5px 10px;
            gap: 5px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }

        .tab-btn {
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-weight: 600;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); border-radius: 0; }

        .container { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; }

        .date-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card);
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }

        .btn-arrow { background: none; border: none; color: var(--gold); font-size: 1.2rem; cursor: pointer; padding: 0 10px; }
        .current-date { font-weight: 700; font-size: 0.9rem; text-transform: capitalize; }

        /* AGENDA GRID */
        .agenda-wrapper {
            display: flex;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow-x: auto;
            position: relative;
        }

        .time-col { min-width: 60px; border-right: 1px solid var(--border); background: #0d0d0d; }
        .time-slot-label {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--muted);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .profs-container { display: flex; flex: 1; }
        .prof-column { min-width: 160px; flex: 1; border-right: 1px solid var(--border); position: relative; }
        .prof-header {
            padding: 10px; text-align: center; font-weight: bold; font-size: 0.75rem;
            background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); color: var(--gold);
        }

        .slots-area { height: calc(15 * 60px); position: relative; cursor: cell; } /* 8h as 22h = 14 slots + margem */
        
        .appointment {
            position: absolute;
            left: 4px; right: 4px;
            background: var(--gold-d);
            border-left: 3px solid var(--gold);
            border-radius: 6px;
            padding: 6px;
            font-size: 0.7rem;
            z-index: 10;
            cursor: pointer;
        }

        .blocked-slot {
            position: absolute;
            left: 0; right: 0;
            background: repeating-linear-gradient(45deg, #222, #222 10px, #2a2a2a 10px, #2a2a2a 20px);
            opacity: 0.6;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 0.6rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* MODAIS */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card); width: 100%; max-width: 380px;
            padding: 25px; border-radius: var(--radius); border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; }
        input, select {
            width: 100%; padding: 12px; background: #1c1c1c; border: 1px solid var(--border);
            border-radius: 8px; color: #fff; outline: none; font-size: 1rem;
        }

        .btn-gold { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; }
        .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }

        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #1c1c1c; color: var(--muted); cursor: pointer; font-size: 0.8rem; }
        .type-btn.active { border-color: var(--gold); color: var(--gold); background: var(--gold-d); }

    </style>
</head>
<body>

<header>
    <div class="logo">BARBER<span>FLOW</span></div>
    <button onclick="openModal('new')" style="background:var(--gold); border:none; padding:8px 15px; border-radius:6px; font-weight:bold; font-size:0.75rem">NOVO +</button>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showView('agenda')">📅 Agenda</button>
    <button class="tab-btn" onclick="showView('equipe')">👥 Equipe</button>
    <button class="tab-btn" onclick="showView('servicos')">✂️ Serviços</button>
    <button class="tab-btn" onclick="showView('plano')">💰 Plano</button>
</div>

<div class="container">
    <div id="view-agenda" class="view active">
        <div class="date-control">
            <button class="btn-arrow" onclick="changeDate(-1)">❮</button>
            <div class="current-date" id="displayDate">Sexta, 06 de Março</div>
            <button class="btn-arrow" onclick="changeDate(1)">❯</button>
        </div>

        <div class="agenda-wrapper">
            <div class="time-col" id="timeLabels"></div>
            <div class="profs-container" id="profsColumns"></div>
        </div>
    </div>

    <!-- EQUIPE / SERVIÇOS / PLANO (Mantidos do anterior) -->
    <div id="view-equipe" class="view">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px">Equipe</h2>
        <div id="prof-list"></div>
        <input type="text" id="new-prof-name" placeholder="Nome do Barbeiro" style="margin-top:10px">
        <button class="btn-gold" style="margin-top:10px" onclick="addBarbeiro()">Adicionar Barbeiro</button>
    </div>

    <div id="view-servicos" class="view">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px">Meus Serviços</h2>
        <div id="service-list"></div>
        <input type="text" id="new-service-name" placeholder="Nome do Serviço" style="margin-top:10px">
        <input type="number" id="new-service-price" placeholder="Preço R$" style="margin-top:10px">
        <button class="btn-gold" style="margin-top:10px" onclick="addServico()">Salvar Serviço</button>
    </div>

    <div id="view-plano" class="view">
        <div style="background:var(--card); padding:20px; border-radius:var(--radius); border:1px solid var(--gold); text-align:center;">
            <div style="color:var(--gold); font-family:'Bebas Neue'; font-size:1.5rem">Plano Pro Ativo</div>
            <p style="font-size:0.8rem; margin:10px 0">R$ 20,90 mensais</p>
            <button class="btn-gold">GERENCIAR</button>
        </div>
    </div>
</div>

<!-- MODAL UNIFICADO (AGENDAMENTO / BLOQUEIO) -->
<div class="modal" id="modalAppt">
    <div class="modal-content">
        <div class="type-selector">
            <button class="type-btn active" id="type-appt" onclick="setModalType('appt')">Agendamento</button>
            <button class="type-btn" id="type-block" onclick="setModalType('block')">Bloqueio / Pausa</button>
        </div>

        <input type="hidden" id="editIndex">
        <input type="hidden" id="itemType" value="appt">
        
        <div id="client-fields">
            <div class="form-group">
                <label>Nome do Cliente</label>
                <input type="text" id="appt-client" placeholder="Ex: Gabriel Silva">
            </div>
        </div>

        <div id="block-fields" style="display:none">
            <div class="form-group">
                <label>Motivo do Bloqueio</label>
                <input type="text" id="block-reason" placeholder="Ex: Almoço / Saída">
            </div>
        </div>

        <div class="form-group">
            <label>Barbeiro</label>
            <select id="appt-prof"></select>
        </div>

        <div style="display:flex; gap:10px">
            <div class="form-group" style="flex:1">
                <label>Horário</label>
                <input type="time" id="appt-time">
            </div>
            <div class="form-group" style="flex:1">
                <label>Duração (min)</label>
                <select id="appt-duration">
                    <option value="30">30 min</option>
                    <option value="60" selected>60 min</option>
                    <option value="90">90 min</option>
                    <option value="120">2 horas</option>
                </select>
            </div>
        </div>

        <button class="btn-gold" onclick="saveItem()">Salvar</button>
        <button id="btnDelete" class="btn-danger" style="display:none" onclick="deleteItem()">Excluir</button>
        <button class="btn-outline" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script>
    let currentDate = new Date();
    let barbeiros = ['Renato', 'João'];
    let servicos = [{ nome: 'Corte Social', preco: 35 }];
    
    // Array Unificado (Agendamentos e Bloqueios)
    let items = [
        { type: 'appt', cliente: 'Exemplo', prof: 'Renato', hora: '09:00', duracao: 60 },
        { type: 'block', motivo: 'ALMOÇO', prof: 'João', hora: '12:00', duracao: 60 }
    ];

    function showView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`view-${viewName}`).classList.add('active');
        if(viewName === 'agenda') renderAgenda();
        if(viewName === 'equipe') renderEquipe();
        if(viewName === 'servicos') renderServicos();
    }

    function renderAgenda() {
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('displayDate').innerText = currentDate.toLocaleDateString('pt-BR', options);

        const timeLabels = document.getElementById('timeLabels');
        timeLabels.innerHTML = '';
        for(let h=8; h<=22; h++) {
            timeLabels.innerHTML += `<div class="time-slot-label">${h}:00</div>`;
        }

        const columns = document.getElementById('profsColumns');
        columns.innerHTML = barbeiros.map(b => `
            <div class="prof-column">
                <div class="prof-header">${b}</div>
                <div class="slots-area" onclick="openQuickAdd('${b}', event)">
                    ${renderItemsFor(b)}
                </div>
            </div>
        `).join('');
    }

    function renderItemsFor(prof) {
        return items
            .filter(i => i.prof === prof)
            .map((item, idx) => {
                const [h, m] = item.hora.split(':').map(Number);
                const top = (h - 8) * 60 + m;
                const height = (item.duracao || 60);

                if(item.type === 'block') {
                    return `<div class="blocked-slot" style="top:${top}px; height:${height}px" onclick="event.stopPropagation(); openModal('edit', ${items.indexOf(item)})">BLOQUEADO: ${item.motivo || ''}</div>`;
                }

                return `
                    <div class="appointment" style="top: ${top}px; height: ${height}px;" onclick="event.stopPropagation(); openModal('edit', ${items.indexOf(item)})">
                        <b>${item.cliente}</b><br>${item.hora} (${item.duracao}m)
                    </div>
                `;
            }).join('');
    }

    function openQuickAdd(prof, event) {
        const rect = event.currentTarget.getBoundingClientRect();
        const y = event.clientY - rect.top;
        const hour = Math.floor(y / 60) + 8;
        const time = `${hour.toString().padStart(2, '0')}:00`;
        openModal('new', null, prof, time);
    }

    function setModalType(type) {
        document.getElementById('itemType').value = type;
        document.getElementById('type-appt').classList.toggle('active', type === 'appt');
        document.getElementById('type-block').classList.toggle('active', type === 'block');
        document.getElementById('client-fields').style.display = type === 'appt' ? 'block' : 'none';
        document.getElementById('block-fields').style.display = type === 'block' ? 'block' : 'none';
    }

    function openModal(mode, index = null, prof = '', time = '10:00') {
        const select = document.getElementById('appt-prof');
        select.innerHTML = barbeiros.map(b => `<option ${b === prof ? 'selected' : ''}>${b}</option>`).join('');
        
        const modal = document.getElementById('modalAppt');
        const btnDel = document.getElementById('btnDelete');
        
        if(mode === 'edit') {
            const it = items[index];
            setModalType(it.type);
            document.getElementById('appt-client').value = it.cliente || '';
            document.getElementById('block-reason').value = it.motivo || '';
            document.getElementById('appt-time').value = it.hora;
            document.getElementById('appt-duration').value = it.duracao || 60;
            document.getElementById('editIndex').value = index;
            btnDel.style.display = 'block';
        } else {
            setModalType('appt');
            document.getElementById('appt-client').value = '';
            document.getElementById('block-reason').value = '';
            document.getElementById('appt-time').value = time;
            document.getElementById('editIndex').value = '-1';
            btnDel.style.display = 'none';
        }
        modal.classList.add('active');
    }

    function closeModal() { document.getElementById('modalAppt').classList.remove('active'); }

    function saveItem() {
        const index = parseInt(document.getElementById('editIndex').value);
        const type = document.getElementById('itemType').value;
        const data = {
            type: type,
            prof: document.getElementById('appt-prof').value,
            hora: document.getElementById('appt-time').value,
            duracao: parseInt(document.getElementById('appt-duration').value),
            cliente: document.getElementById('appt-client').value,
            motivo: document.getElementById('block-reason').value
        };

        if(index > -1) items[index] = data;
        else items.push(data);

        closeModal();
        renderAgenda();
    }

    function deleteItem() {
        const index = parseInt(document.getElementById('editIndex').value);
        if(index > -1) { items.splice(index, 1); closeModal(); renderAgenda(); }
    }

    function changeDate(days) { currentDate.setDate(currentDate.getDate() + days); renderAgenda(); }

    // Listas auxiliares (Equipe e Serviços)
    function renderEquipe() {
        document.getElementById('prof-list').innerHTML = barbeiros.map((b, i) => `
            <div style="background:var(--card); padding:12px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; border:1px solid var(--border)">
                <span>${b}</span>
                <button onclick="barbeiros.splice(${i},1); renderEquipe();" style="color:var(--danger); background:none; border:none; font-weight:bold">X</button>
            </div>
        `).join('');
    }
    function addBarbeiro() {
        const v = document.getElementById('new-prof-name').value;
        if(v) { barbeiros.push(v); document.getElementById('new-prof-name').value = ''; renderEquipe(); }
    }
    function renderServicos() {
        document.getElementById('service-list').innerHTML = servicos.map((s, i) => `
            <div style="background:var(--card); padding:12px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; border:1px solid var(--border)">
                <span>${s.nome} - R$ ${s.preco}</span>
                <button onclick="servicos.splice(${i},1); renderServicos();" style="color:var(--danger); background:none; border:none; font-weight:bold">X</button>
            </div>
        `).join('');
    }
    function addServico() {
        const n = document.getElementById('new-service-name').value;
        const p = document.getElementById('new-service-price').value;
        if(n && p) { servicos.push({nome:n, preco:p}); renderServicos(); }
    }

    renderAgenda();
</script>

</body>
</html>
