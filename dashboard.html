<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow PRO</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .gold-gradient { background: linear-gradient(135deg, #c9973a 0%, #a67c2e 100%); }
        .gold-text { color: #c9973a; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Ícones simples via SVG (Substituindo Lucide para garantir performance offline)
        const Icon = ({ name, size = 20 }) => {
            const icons = {
                calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
                users: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
                scissors: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line></svg>,
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
                trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
                chevronLeft: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
                chevronRight: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [view, setView] = useState('agenda');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [loading, setLoading] = useState(true);
            
            // Dados Persistentes
            const [barbeiros, setBarbeiros] = useState(() => {
                const saved = localStorage.getItem('bf_barbeiros');
                return saved ? JSON.parse(saved) : [{ id: 1, nome: 'Renato' }];
            });

            const [servicos, setServicos] = useState(() => {
                const saved = localStorage.getItem('bf_servicos');
                return saved ? JSON.parse(saved) : [
                    { id: 1, nome: 'Corte Social', preco: '40.00' },
                    { id: 2, nome: 'Barba Premium', preco: '30.00' }
                ];
            });

            const [agenda, setAgenda] = useState(() => {
                const saved = localStorage.getItem('bf_agenda');
                return saved ? JSON.parse(saved) : [];
            });

            const [modalOpen, setModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [form, setForm] = useState({ cliente: '', whatsapp: '', barbeiro_nome: '', servico_nome: '', hora: '09:00', duracao: 30, tipo: 'appt' });

            useEffect(() => {
                localStorage.setItem('bf_barbeiros', JSON.stringify(barbeiros));
                localStorage.setItem('bf_servicos', JSON.stringify(servicos));
                localStorage.setItem('bf_agenda', JSON.stringify(agenda));
            }, [barbeiros, servicos, agenda]);

            useEffect(() => { setTimeout(() => setLoading(false), 600); }, []);

            const timeSlots = useMemo(() => {
                const slots = [];
                for (let i = 8; i <= 20; i++) {
                    slots.push(`${i.toString().padStart(2, '0')}:00`);
                    slots.push(`${i.toString().padStart(2, '0')}:30`);
                }
                return slots;
            }, []);

            const handleSave = () => {
                const dateStr = currentDate.toISOString().split('T')[0];
                const payload = { ...form, id: editingItem ? editingItem.id : Date.now(), data: dateStr };
                if (editingItem) setAgenda(agenda.map(i => i.id === editingItem.id ? payload : i));
                else setAgenda([...agenda, payload]);
                setModalOpen(false);
            };

            const openModal = (mode, item = null, defaults = {}) => {
                if (mode === 'edit') { setEditingItem(item); setForm({ ...item }); }
                else {
                    setEditingItem(null);
                    setForm({ cliente: '', whatsapp: '', barbeiro_nome: defaults.prof || barbeiros[0]?.nome, servico_nome: servicos[0]?.nome, hora: defaults.hora || '09:00', duracao: 30, tipo: 'appt' });
                }
                setModalOpen(true);
            };

            if (loading) return (
                <div className="min-h-screen bg-[#0a0a0a] flex flex-col items-center justify-center">
                    <h1 className="text-3xl font-black italic gold-text animate-pulse uppercase">BARBERFLOW</h1>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">
                    <header className="p-5 bg-[#141414]/80 backdrop-blur-md sticky top-0 z-40 border-b border-white/5 flex justify-between items-center">
                        <div className="font-black text-xl italic tracking-tighter uppercase">BARBER<span className="gold-text">FLOW</span></div>
                        <button onClick={() => openModal('new')} className="gold-gradient text-black px-4 py-2 rounded-xl font-black text-[10px] flex items-center gap-2 shadow-lg">
                            <Icon name="plus" size={14} /> NOVO
                        </button>
                    </header>

                    <nav className="flex bg-[#111] border-b border-white/5 sticky top-[73px] z-30">
                        {['agenda', 'equipe', 'servicos'].map(tab => (
                            <button key={tab} onClick={() => setView(tab)} className={`flex-1 py-4 text-[9px] font-black uppercase tracking-widest ${view === tab ? 'gold-text border-b-2 border-[#c9973a]' : 'text-gray-500'}`}>
                                {tab}
                            </button>
                        ))}
                    </nav>

                    <main className="p-4 animate-fade-in">
                        {view === 'agenda' && (
                            <div>
                                <div className="flex items-center justify-between mb-6 glass p-3 rounded-2xl">
                                    <button onClick={() => {const d=new Date(currentDate); d.setDate(d.getDate()-1); setCurrentDate(d);}} className="gold-text"><Icon name="chevronLeft"/></button>
                                    <div className="text-center">
                                        <p className="text-[10px] gold-text font-black uppercase tracking-widest">{currentDate.toLocaleDateString('pt-PT', {weekday: 'long'})}</p>
                                        <p className="text-sm font-bold">{currentDate.toLocaleDateString('pt-PT', {day: 'numeric', month: 'long'})}</p>
                                    </div>
                                    <button onClick={() => {const d=new Date(currentDate); d.setDate(d.getDate()+1); setCurrentDate(d);}} className="gold-text"><Icon name="chevronRight"/></button>
                                </div>

                                <div className="flex bg-[#141414] rounded-3xl border border-white/5 overflow-hidden shadow-2xl">
                                    <div className="w-14 bg-black/40 border-r border-white/5">
                                        {timeSlots.map(s => <div key={s} className="h-16 flex items-center justify-center text-[9px] font-bold text-gray-600 border-b border-white/5">{s}</div>)}
                                    </div>
                                    <div className="flex flex-1 overflow-x-auto no-scrollbar">
                                        {barbeiros.map(b => (
                                            <div key={b.id} className="min-w-[140px] flex-1 border-r border-white/5 relative">
                                                <div className="h-10 bg-white/5 flex items-center justify-center text-[10px] font-black gold-text uppercase border-b border-white/5">{b.nome}</div>
                                                <div className="relative h-[1664px]" onClick={(e) => {
                                                    const rect = e.currentTarget.getBoundingClientRect();
                                                    const slotIdx = Math.floor((e.clientY - rect.top) / 64);
                                                    openModal('new', null, { prof: b.nome, hora: timeSlots[slotIdx] });
                                                }}>
                                                    {agenda.filter(a => a.barbeiro_nome === b.nome && a.data === currentDate.toISOString().split('T')[0]).map(item => (
                                                        <div key={item.id} onClick={(e) => { e.stopPropagation(); openModal('edit', item); }} 
                                                             className={`absolute inset-x-1 rounded-xl border-l-4 p-2 shadow-lg z-10 ${item.tipo === 'block' ? 'bg-red-500/10 border-red-500' : 'bg-[#c9973a]/20 border-[#c9973a]'}`}
                                                             style={{ top: `${((parseInt(item.hora.split(':')[0])-8)*2 + (item.hora.includes(':30')?1:0))*64}px`, height: '60px' }}>
                                                            <div className="text-[10px] font-black truncate uppercase">{item.tipo === 'block' ? 'Bloqueado' : item.cliente}</div>
                                                            <div className="text-[8px] opacity-60 font-bold uppercase">{item.servico_nome}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'equipe' && (
                            <div className="space-y-4">
                                {barbeiros.map(b => (
                                    <div key={b.id} className="glass p-5 rounded-3xl flex justify-between items-center">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 gold-gradient rounded-xl flex items-center justify-center text-black font-black italic">{b.nome[0]}</div>
                                            <span className="font-bold text-lg">{b.nome}</span>
                                        </div>
                                        <button onClick={() => setBarbeiros(barbeiros.filter(x => x.id !== b.id))} className="text-red-500"><Icon name="trash" size={18}/></button>
                                    </div>
                                ))}
                                <div className="flex gap-2 mt-8">
                                    <input id="new-b" placeholder="Novo barbeiro" className="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" />
                                    <button onClick={() => {const v=document.getElementById('new-b').value; if(v){setBarbeiros([...barbeiros, {id:Date.now(), nome:v}]); document.getElementById('new-b').value='';}}} className="gold-gradient text-black px-6 rounded-2xl font-black uppercase text-[10px]">Add</button>
                                </div>
                            </div>
                        )}

                        {view === 'servicos' && (
                            <div className="space-y-4">
                                {servicos.map(s => (
                                    <div key={s.id} className="glass p-5 rounded-3xl flex justify-between items-center">
                                        <div><p className="font-bold">{s.nome}</p><p className="gold-text text-xs font-black">€ {s.preco}</p></div>
                                        <button onClick={() => setServicos(servicos.filter(x => x.id !== s.id))} className="text-red-500"><Icon name="trash" size={18}/></button>
                                    </div>
                                ))}
                                <div className="bg-white/5 p-6 rounded-[2.5rem] border border-white/5 space-y-3">
                                    <input id="s-n" placeholder="Serviço" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" />
                                    <input id="s-p" placeholder="Preço (Ex: 20.00)" className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" />
                                    <button onClick={() => {const n=document.getElementById('s-n').value, p=document.getElementById('s-p').value; if(n&&p){setServicos([...servicos, {id:Date.now(), nome:n, preco:p}]); document.getElementById('s-n').value=''; document.getElementById('s-p').value='';}}} className="w-full gold-gradient text-black py-4 rounded-2xl font-black uppercase text-[10px]">Gravar</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {modalOpen && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-end justify-center p-4">
                            <div className="bg-[#141414] w-full max-w-md rounded-t-[2.5rem] p-8 space-y-6 border border-white/10 shadow-2xl animate-fade-in">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-lg font-black italic gold-text uppercase">{editingItem ? 'EDITAR' : 'NOVO'} AGENDAMENTO</h3>
                                    <div className="flex bg-white/5 p-1 rounded-full">
                                        <button onClick={() => setForm({...form, tipo:'appt'})} className={`px-4 py-2 rounded-full text-[9px] font-black ${form.tipo === 'appt' ? 'gold-gradient text-black' : 'text-gray-500'}`}>AGENDA</button>
                                        <button onClick={() => setForm({...form, tipo:'block'})} className={`px-4 py-2 rounded-full text-[9px] font-black ${form.tipo === 'block' ? 'bg-red-500 text-white' : 'text-gray-500'}`}>BLOCK</button>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    {form.tipo === 'appt' && (
                                        <input className="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none" placeholder="Nome do Cliente" value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} />
                                    )}
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none" value={form.barbeiro_nome} onChange={e => setForm({...form, barbeiro_nome: e.target.value})}>
                                            {barbeiros.map(b => <option key={b.id} value={b.nome} className="bg-black">{b.nome}</option>)}
                                        </select>
                                        <select className="bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none" value={form.hora} onChange={e => setForm({...form, hora: e.target.value})}>
                                            {timeSlots.map(t => <option key={t} value={t} className="bg-black">{t}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={handleSave} className="w-full gold-gradient text-black py-5 rounded-2xl font-black uppercase tracking-widest">Confirmar</button>
                                    {editingItem && <button onClick={() => {setAgenda(agenda.filter(a=>a.id!==editingItem.id)); setModalOpen(false);}} className="w-full text-red-500 text-[10px] font-black uppercase tracking-widest">Eliminar</button>}
                                    <button onClick={() => setModalOpen(false)} className="w-full text-gray-500 text-[10px] font-black uppercase">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
