<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow Dashboard</title>
    <!-- Carregamento de bibliotecas via CDN (Modo Navegador) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; margin: 0; }
        .gold-text { color: #c9973a; }
        .gold-bg { background: linear-gradient(135deg, #c9973a 0%, #a67c2e 100%); }
        .card { background: #141414; border: 1px solid rgba(255,255,255,0.05); }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; border-top-color: #c9973a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // CONFIGURAÇÃO DIRETA
        const SB_URL = 'https://pvsmbsoqhkcpdeztosrg.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2c21ic29xaGtjcGRlenRvc3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NTEyOTUsImV4cCI6MjA4ODQyNzI5NX0.UufvlSa0Eyk7JPFrMVe3TmsuYTpWppi3PA6I2uhcqa4';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        const Icon = ({ name, size = 20 }) => {
            const LucideIcon = lucide.icons[name];
            return LucideIcon ? <LucideIcon size={size} /> : null;
        };

        function App() {
            const [loading, setLoading] = useState(true);
            const [barbeiros, setBarbeiros] = useState([]);
            const [error, setError] = useState(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        setLoading(true);
                        // Testa a conexão buscando o barbeiro que você criou no SQL
                        const { data, error: sbError } = await supabaseClient
                            .from('barbeiros')
                            .select('*');

                        if (sbError) throw sbError;
                        setBarbeiros(data || []);
                    } catch (err) {
                        console.error("Erro Supabase:", err);
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                };
                init();
            }, []);

            if (loading) return (
                <div className="flex flex-col items-center justify-center min-h-screen">
                    <div className="w-10 h-10 border-4 border-white/10 rounded-full spinner mb-4"></div>
                    <div className="gold-text font-black tracking-widest text-xs animate-pulse uppercase">Sincronizando Nuvem...</div>
                </div>
            );

            if (error) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-10 text-center">
                    <div className="text-red-500 text-4xl mb-4">⚠️</div>
                    <h2 className="font-bold mb-2">Falha na Conexão</h2>
                    <p className="text-zinc-500 text-xs mb-6">{error}</p>
                    <button onClick={() => window.location.reload()} className="gold-bg text-black px-8 py-3 rounded-full font-bold">Tentar Novamente</button>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#0a0a0a] flex flex-col shadow-2xl">
                    <header className="p-6 border-b border-white/5 flex justify-between items-center">
                        <div className="font-black italic text-xl">BARBER<span className="gold-text">FLOW</span></div>
                        <div className="flex items-center gap-2">
                             <span className="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                             <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-tighter">Online</span>
                        </div>
                    </header>

                    <main className="flex-1 p-6 space-y-6">
                        <section>
                            <h2 className="text-xs font-black gold-text uppercase tracking-[0.2em] mb-4">Equipe Disponível</h2>
                            <div className="grid gap-3">
                                {barbeiros.length > 0 ? barbeiros.map(b => (
                                    <div key={b.id} className="card p-4 rounded-2xl flex items-center justify-between shadow-lg">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 gold-bg rounded-full flex items-center justify-center text-black font-black uppercase">{b.nome[0]}</div>
                                            <span className="font-bold">{b.nome}</span>
                                        </div>
                                        <Icon name="CheckCircle" />
                                    </div>
                                )) : (
                                    <div className="p-10 border-2 border-dashed border-white/5 rounded-3xl text-center text-zinc-600 italic text-sm">
                                        Nenhum barbeiro ativo.<br/>Adicione no painel.
                                    </div>
                                )}
                            </div>
                        </section>

                        <section className="bg-zinc-900/50 p-6 rounded-[2.5rem] border border-white/5">
                            <h3 className="text-sm font-bold mb-2 italic">Tudo pronto!</h3>
                            <p className="text-xs text-zinc-500 leading-relaxed">O banco de dados respondeu com sucesso. Clique no botão abaixo para iniciar um agendamento teste.</p>
                            <button className="w-full gold-bg text-black font-black py-4 rounded-2xl mt-6 uppercase text-xs shadow-xl active:scale-95 transition-all">Iniciar Agendamento +</button>
                        </section>
                    </main>

                    <nav className="p-6 bg-[#141414] border-t border-white/5 flex justify-around">
                        <button className="gold-text"><Icon name="Calendar" /></button>
                        <button className="text-zinc-600"><Icon name="Users" /></button>
                        <button className="text-zinc-600"><Icon name="Settings" /></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
