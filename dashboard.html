<script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { createClient } = supabase;

    // CONFIGURAÇÃO SUPABASE
    const SB_URL = 'https://pvsmbsoqhkcpdeztosrg.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2c21ic29xaGtjcGRlenRvc3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NTEyOTUsImV4cCI6MjA4ODQyNzI5NX0.UufvlSa0Eyk7JPFrMVe3TmsuYTpWppi3PA6I2uhcqa4';
    const client = createClient(SB_URL, SB_KEY);

    const Icon = ({ name, size = 20, className = "" }) => {
        const LucideIcon = lucide.icons[name];
        return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
    };

    function App() {
        const [view, setView] = useState('agenda');
        const [currentDate, setCurrentDate] = useState(new Date());
        const [loading, setLoading] = useState(true);
        const [barbeiros, setBarbeiros] = useState([]);
        const [servicos, setServicos] = useState([]);
        const [agenda, setAgenda] = useState([]);
        const [modalOpen, setModalOpen] = useState(false);
        const [editingItem, setEditingItem] = useState(null);

        const [form, setForm] = useState({
            cliente: '', whatsapp: '', barbeiro_nome: '', servico_nome: '', 
            hora: '09:00', duracao: 30, tipo: 'appt'
        });

        useEffect(() => {
            fetchInitialData();
        }, []);

        useEffect(() => {
            fetchAgenda();
        }, [currentDate]);

        async function fetchInitialData() {
            setLoading(true);
            const { data: b } = await client.from('barbeiros').select('*').order('nome');
            const { data: s } = await client.from('servicos').select('*').order('nome');
            setBarbeiros(b || []);
            setServicos(s || []);
            await fetchAgenda();
            setLoading(false);
        }

        async function fetchAgenda() {
            const dateStr = currentDate.toISOString().split('T')[0];
            const { data } = await client.from('agenda').select('*').eq('data', dateStr);
            setAgenda(data || []);
        }

        async function handleSave() {
            const dateStr = currentDate.toISOString().split('T')[0];
            const payload = { ...form, data: dateStr };
            
            if (editingItem) {
                await client.from('agenda').update(payload).eq('id', editingItem.id);
            } else {
                await client.from('agenda').insert([payload]);
            }
            
            setModalOpen(false);
            setEditingItem(null);
            fetchAgenda();
        }

        async function handleDelete(id) {
            if (confirm('Excluir este agendamento?')) {
                await client.from('agenda').delete().eq('id', id);
                setModalOpen(false);
                fetchAgenda();
            }
        }

        const timeSlots = useMemo(() => {
            const slots = [];
            for (let i = 8; i <= 21; i++) {
                slots.push(`${i.toString().padStart(2, '0')}:00`);
                slots.push(`${i.toString().padStart(2, '0')}:30`);
            }
            slots.push("22:00");
            return slots;
        }, []);

        if (loading) return (
            <div className="flex flex-col items-center justify-center min-h-screen text-[#c9973a]">
                <div className="text-3xl font-black italic mb-2 tracking-tighter">BARBER<span className="text-white">FLOW</span></div>
                <div className="animate-pulse text-[10px] font-bold uppercase tracking-[0.3em]">Conectando...</div>
            </div>
        );

        return (
            <div className="max-w-md mx-auto min-h-screen pb-24 relative">
                {/* Header */}
                <header className="p-5 flex justify-between items-center sticky top-0 bg-[#0a0a0a] z-40 border-b border-white/5">
                    <div className="font-black italic text-xl">BARBER<span className="text-[#c9973a]">FLOW</span></div>
                    <button onClick={() => {
                        setEditingItem(null);
                        setForm({
                            cliente: '', whatsapp: '', barbeiro_nome: barbeiros[0]?.nome || '',
                            servico_nome: servicos[0]?.nome || '', hora: '09:00', duracao: 30, tipo: 'appt'
                        });
                        setModalOpen(true);
                    }} className="gold-gradient text-black px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-[#c9973a]/20">
                        Novo +
                    </button>
                </header>

                {/* Tabs */}
                <div className="flex px-4 border-b border-white/5">
                    {[
                        { id: 'agenda', icon: 'Calendar', label: 'Agenda' },
                        { id: 'equipe', icon: 'Users', label: 'Equipe' },
                        { id: 'servicos', icon: 'Scissors', label: 'Serviços' }
                    ].map(tab => (
                        <button key={tab.id} onClick={() => setView(tab.id)} className={`flex-1 py-4 flex flex-col items-center gap-1 transition-all ${view === tab.id ? 'text-[#c9973a] border-b-2 border-[#c9973a]' : 'text-zinc-600'}`}>
                            <Icon name={tab.icon} size={18} />
                            <span className="text-[9px] font-black uppercase tracking-widest">{tab.label}</span>
                        </button>
                    ))}
                </div>

                <main className="p-4">
                    {view === 'agenda' && (
                        <div className="animate-in fade-in duration-500">
                            {/* Seletor de Data */}
                            <div className="flex items-center justify-between mb-6 bg-[#141414] p-3 rounded-2xl border border-white/5">
                                <button onClick={() => {
                                    const d = new Date(currentDate); d.setDate(d.getDate() - 1); setCurrentDate(d);
                                }} className="text-[#c9973a] p-2"><Icon name="ChevronLeft" /></button>
                                <div className="text-center">
                                    <div className="text-[10px] font-black text-[#c9973a] uppercase tracking-widest">{currentDate.toLocaleDateString('pt-BR', { weekday: 'long' })}</div>
                                    <div className="font-bold">{currentDate.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long' })}</div>
                                </div>
                                <button onClick={() => {
                                    const d = new Date(currentDate); d.setDate(d.getDate() + 1); setCurrentDate(d);
                                }} className="text-[#c9973a] p-2"><Icon name="ChevronRight" /></button>
                            </div>

                            {/* Grade */}
                            <div className="flex bg-[#141414] rounded-3xl border border-white/5 overflow-hidden shadow-2xl">
                                <div className="w-14 bg-black/20 border-r border-white/5">
                                    <div className="h-10"></div>
                                    {timeSlots.map(t => (
                                        <div key={t} className="h-16 flex items-center justify-center text-[10px] font-bold text-zinc-600 border-b border-white/5">{t}</div>
                                    ))}
                                </div>
                                <div className="flex-1 overflow-x-auto no-scrollbar flex">
                                    {barbeiros.map(b => (
                                        <div key={b.id} className="min-w-[150px] flex-1 border-r border-white/5 relative">
                                            <div className="h-10 flex items-center justify-center text-[10px] font-black text-[#c9973a] border-b border-[#c9973a]/20 uppercase tracking-tighter">{b.nome}</div>
                                            <div className="relative h-[1856px]">
                                                {agenda.filter(a => a.barbeiro_nome === b.nome).map(item => {
                                                    const [h, m] = item.hora.split(':').map(Number);
                                                    const top = ((h - 8) * 2 + (m === 30 ? 1 : 0)) * 64;
                                                    return (
                                                        <div key={item.id} onClick={() => { setEditingItem(item); setForm({...item}); setModalOpen(true); }} className={`absolute inset-x-1 p-2 rounded-xl text-[10px] font-bold shadow-lg z-10 ${item.tipo === 'block' ? 'slot-blocked' : 'slot-active'}`} style={{ top: `${top}px`, height: '60px' }}>
                                                            <div className="truncate uppercase tracking-tighter">{item.tipo === 'block' ? '🚫 Bloqueado' : item.cliente}</div>
                                                            <div className="opacity-60 text-[8px]">{item.servico_nome}</div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'equipe' && (
                        <div className="space-y-4">
                            <h3 className="font-black italic text-lg text-[#c9973a]">GESTÃO DE EQUIPE</h3>
                            {barbeiros.map(b => (
                                <div key={b.id} className="card-dark p-4 rounded-2xl flex justify-between items-center shadow-lg">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-[#c9973a]/10 rounded-full flex items-center justify-center text-[#c9973a] font-black uppercase">{b.nome[0]}</div>
                                        <span className="font-bold">{b.nome}</span>
                                    </div>
                                    <button onClick={async () => { if(confirm('Excluir?')){ await client.from('barbeiros').delete().eq('id', b.id); fetchInitialData(); } }} className="text-red-900"><Icon name="Trash2" size={18}/></button>
                                </div>
                            ))}
                            <div className="card-dark p-2 rounded-2xl flex gap-2">
                                <input id="addB" placeholder="Novo Barbeiro" className="flex-1 bg-transparent border-none p-3 text-sm font-bold" />
                                <button onClick={async () => {
                                    const val = document.getElementById('addB').value;
                                    if(val) { await client.from('barbeiros').insert([{nome: val}]); fetchInitialData(); document.getElementById('addB').value = ''; }
                                }} className="gold-gradient text-black px-4 rounded-xl font-black"><Icon name="Plus" /></button>
                            </div>
                        </div>
                    )}

                    {view === 'servicos' && (
                        <div className="space-y-4">
                            <h3 className="font-black italic text-lg text-[#c9973a]">SERVIÇOS E PREÇOS</h3>
                            {servicos.map(s => (
                                <div key={s.id} className="card-dark p-4 rounded-2xl flex justify-between items-center shadow-lg">
                                    <div>
                                        <div className="font-bold">{s.nome}</div>
                                        <div className="text-[10px] font-black text-[#c9973a]">R$ {s.preco}</div>
                                    </div>
                                    <button onClick={async () => { if(confirm('Excluir?')){ await client.from('servicos').delete().eq('id', s.id); fetchInitialData(); } }} className="text-red-900"><Icon name="Trash2" size={18}/></button>
                                </div>
                            ))}
                            <div className="card-dark p-3 rounded-2xl flex flex-col gap-2">
                                <input id="addSN" placeholder="Nome do Serviço" className="bg-transparent p-2 text-sm font-bold" />
                                <div className="flex gap-2">
                                    <input id="addSP" placeholder="Preço (ex: 50)" type="number" className="flex-1 bg-transparent p-2 text-sm font-bold" />
                                    <button onClick={async () => {
                                        const n = document.getElementById('addSN').value;
                                        const p = document.getElementById('addSP').value;
                                        if(n && p) { await client.from('servicos').insert([{nome: n, preco: p}]); fetchInitialData(); document.getElementById('addSN').value = ''; document.getElementById('addSP').value = ''; }
                                    }} className="gold-gradient text-black px-6 rounded-xl font-black uppercase text-[10px]">Adicionar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </main>

                {/* Modal */}
                {modalOpen && (
                    <div className="fixed inset-0 bg-black/90 z-50 flex items-end justify-center p-4 backdrop-blur-sm">
                        <div className="bg-[#141414] w-full max-w-md rounded-t-[2.5rem] p-8 border border-white/10 space-y-5 animate-in slide-in-from-bottom-full duration-300">
                            <div className="flex justify-between items-center">
                                <h2 className="text-xl font-black text-[#c9973a] italic uppercase">{editingItem ? 'Editar' : 'Novo Registro'}</h2>
                                <div className="flex bg-black/40 p-1 rounded-xl">
                                    <button onClick={() => setForm({...form, tipo:'appt'})} className={`px-4 py-1.5 rounded-lg text-[9px] font-black transition-all ${form.tipo === 'appt' ? 'bg-[#c9973a] text-black' : 'text-zinc-600'}`}>AGENDA</button>
                                    <button onClick={() => setForm({...form, tipo:'block'})} className={`px-4 py-1.5 rounded-lg text-[9px] font-black transition-all ${form.tipo === 'block' ? 'bg-red-600 text-white' : 'text-zinc-600'}`}>BLOQUEAR</button>
                                </div>
                            </div>

                            {form.tipo === 'appt' ? (
                                <>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-zinc-500 uppercase ml-2">Cliente</label>
                                        <input className="w-full p-4 rounded-2xl font-bold" value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-zinc-500 uppercase ml-2">WhatsApp</label>
                                        <div className="flex gap-2">
                                            <input className="flex-1 p-4 rounded-2xl font-bold" placeholder="(00) 00000-0000" value={form.whatsapp} onChange={e => setForm({...form, whatsapp: e.target.value})} />
                                            {form.whatsapp && (
                                                <button onClick={() => window.open(`https://wa.me/55${form.whatsapp.replace(/\D/g,'')}?text=Olá, confirmado seu horário!`, '_blank')} className="p-4 bg-green-600/20 text-green-500 rounded-2xl border border-green-500/20"><Icon name="Phone" /></button>
                                            )}
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black text-zinc-500 uppercase ml-2">Serviço</label>
                                        <select className="w-full p-4 rounded-2xl font-bold appearance-none" value={form.servico_nome} onChange={e => setForm({...form, servico_nome: e.target.value})}>
                                            {servicos.map(s => <option key={s.id} value={s.nome}>{s.nome} — R$ {s.preco}</option>)}
                                        </select>
                                    </div>
                                </>
                            ) : (
                                <div className="p-6 bg-red-600/5 border border-red-600/20 rounded-3xl text-center text-red-600">
                                    <Icon name="Lock" size={40} className="mx-auto mb-2 opacity-50" />
                                    <div className="text-xs font-black uppercase">Horário ficará bloqueado</div>
                                </div>
                            )}

                            <div className="grid grid-cols-2 gap-3">
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-zinc-500 uppercase ml-2">Barbeiro</label>
                                    <select className="w-full p-4 rounded-2xl font-bold text-xs appearance-none" value={form.barbeiro_nome} onChange={e => setForm({...form, barbeiro_nome: e.target.value})}>
                                        {barbeiros.map(b => <option key={b.id} value={b.nome}>{b.nome}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-zinc-500 uppercase ml-2">Hora</label>
                                    <select className="w-full p-4 rounded-2xl font-bold text-xs appearance-none" value={form.hora} onChange={e => setForm({...form, hora: e.target.value})}>
                                        {timeSlots.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="pt-4 space-y-3">
                                <button onClick={handleSave} className="w-full gold-gradient text-black py-5 rounded-[2rem] font-black uppercase shadow-xl">Confirmar</button>
                                {editingItem && (
                                    <button onClick={() => handleDelete(editingItem.id)} className="w-full text-red-800 font-black text-[10px] uppercase">Excluir Agendamento</button>
                                )}
                                <button onClick={() => setModalOpen(false)} className="w-full text-zinc-600 font-black text-[10px] uppercase">Voltar</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    lucide.createIcons();
</script>
