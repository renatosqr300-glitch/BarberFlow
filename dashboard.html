<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow — Sistema na Nuvem</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --gold: #c9973a; --gold-d: rgba(201,151,58,0.15);
            --text: #f0ece4; --muted: #888; --border: rgba(255,255,255,0.08); --radius: 12px;
            --danger: #ff4444; --success: #00ff64;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'DM Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 30px; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 1.6rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        .nav-tabs { display: flex; background: var(--card); padding: 5px 10px; gap: 5px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .tab-btn { padding: 12px 15px; border-radius: 8px; border: none; background: transparent; color: var(--muted); font-weight: 600; font-size: 0.8rem; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); border-radius: 0; }

        .container { padding: 15px; max-width: 1200px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; }

        .date-control { display: flex; align-items: center; justify-content: space-between; background: var(--card); padding: 12px; border-radius: var(--radius); margin-bottom: 15px; border: 1px solid var(--border); }
        .btn-arrow { background: none; border: none; color: var(--gold); font-size: 1.2rem; cursor: pointer; padding: 0 10px; }
        .current-date { font-weight: 700; font-size: 0.9rem; text-transform: capitalize; }

        .agenda-wrapper { display: flex; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow-x: auto; position: relative; }
        .time-col { min-width: 60px; border-right: 1px solid var(--border); background: #0d0d0d; }
        .time-slot-label { height: 60px; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--muted); border-bottom: 1px solid rgba(255,255,255,0.03); }
        .profs-container { display: flex; flex: 1; }
        .prof-column { min-width: 160px; flex: 1; border-right: 1px solid var(--border); position: relative; }
        .prof-header { padding: 10px; text-align: center; font-weight: bold; font-size: 0.75rem; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); color: var(--gold); }
        .slots-area { height: calc(15 * 60px); position: relative; }
        
        .appointment { position: absolute; left: 4px; right: 4px; background: var(--gold-d); border-left: 3px solid var(--gold); border-radius: 6px; padding: 6px; font-size: 0.7rem; z-index: 10; cursor: pointer; color: #fff; overflow: hidden; }
        .blocked-slot { position: absolute; left: 0; right: 0; background: repeating-linear-gradient(45deg, #222, #222 10px, #2a2a2a 10px, #2a2a2a 20px); opacity: 0.6; z-index: 5; display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.6rem; font-weight: bold; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 380px; padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); }
        
        input, select { width: 100%; padding: 12px; background: #1c1c1c; border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 15px; font-size: 1rem; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 700; width: 100%; cursor: pointer; }
        .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; }
        
        .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">
    <div class="logo">BARBER<span>FLOW</span></div>
    <p style="color:var(--gold); margin-top:10px; font-size:0.8rem">CONECTANDO À NUVEM...</p>
</div>

<header>
    <div class="logo">BARBER<span>FLOW</span></div>
    <button onclick="openModal('new')" style="background:var(--gold); border:none; padding:8px 15px; border-radius:6px; font-weight:bold; font-size:0.75rem">NOVO +</button>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showView('agenda')">📅 Agenda</button>
    <button class="tab-btn" onclick="showView('equipe')">👥 Equipe</button>
    <button class="tab-btn" onclick="showView('servicos')">✂️ Serviços</button>
</div>

<div class="container">
    <div id="view-agenda" class="view active">
        <div class="date-control">
            <button class="btn-arrow" onclick="changeDate(-1)">❮</button>
            <div class="current-date" id="displayDate">---</div>
            <button class="btn-arrow" onclick="changeDate(1)">❯</button>
        </div>
        <div class="agenda-wrapper">
            <div class="time-col" id="timeLabels"></div>
            <div class="profs-container" id="profsColumns"></div>
        </div>
    </div>

    <div id="view-equipe" class="view">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px">Equipe</h2>
        <div id="prof-list"></div>
        <input type="text" id="new-prof-name" placeholder="Nome do Barbeiro">
        <button class="btn-gold" onclick="addBarbeiro()">Adicionar Barbeiro</button>
    </div>

    <div id="view-servicos" class="view">
        <h2 style="font-family:'Bebas Neue'; margin-bottom:15px">Serviços</h2>
        <div id="service-list"></div>
        <input type="text" id="new-service-name" placeholder="Serviço">
        <input type="number" id="new-service-price" placeholder="Preço R$">
        <button class="btn-gold" onclick="addServico()">Adicionar Serviço</button>
    </div>
</div>

<div class="modal" id="modalAppt">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-bottom:15px; color:var(--gold)">Novo Agendamento</h3>
        <input type="hidden" id="editId">
        <input type="text" id="appt-client" placeholder="Nome do Cliente">
        <select id="appt-prof"></select>
        <div style="display:flex; gap:10px">
            <input type="time" id="appt-time" style="flex:1">
            <select id="appt-dur" style="flex:1">
                <option value="30">30 min</option>
                <option value="60" selected>1 hora</option>
                <option value="120">2 horas</option>
            </select>
        </div>
        <button class="btn-gold" onclick="handleSave()">Salvar Agendamento</button>
        <button id="btnDelete" class="btn-outline" style="color:var(--danger); border-color:var(--danger); display:none" onclick="handleDelete()">Excluir</button>
        <button class="btn-outline" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script>
    const SB_URL = 'https://pvsmbsoqhkcpdeztosrg.supabase.co';
    const SB_KEY = 'sb_publishable_4EmgtmprG6lfXNG0U7v6dQ_RaVkjr5n';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentDate = new Date();
    let barbeiros = [];
    let servicos = [];
    let agendaItems = [];

    async function init() {
        try {
            await Promise.all([fetchBarbeiros(), fetchServicos(), fetchAgenda()]);
            document.getElementById('loading').style.display = 'none';
        } catch(e) { console.error(e); }
    }

    async function fetchBarbeiros() {
        const { data } = await _supabase.from('barbeiros').select('*').order('nome');
        barbeiros = data || [];
        renderEquipe();
    }
    async function fetchServicos() {
        const { data } = await _supabase.from('servicos').select('*').order('nome');
        servicos = data || [];
        renderServicos();
    }
    async function fetchAgenda() {
        const d = currentDate.toISOString().split('T')[0];
        const { data } = await _supabase.from('agenda').select('*').eq('data', d);
        agendaItems = data || [];
        renderAgenda();
    }

    async function handleSave() {
        const id = document.getElementById('editId').value;
        const payload = {
            tipo: 'appt',
            barbeiro_nome: document.getElementById('appt-prof').value,
            data: currentDate.toISOString().split('T')[0],
            hora: document.getElementById('appt-time').value,
            duracao: parseInt(document.getElementById('appt-dur').value),
            cliente: document.getElementById('appt-client').value
        };

        if(id) await _supabase.from('agenda').update(payload).eq('id', id);
        else await _supabase.from('agenda').insert([payload]);
        
        closeModal();
        fetchAgenda();
    }

    async function handleDelete() {
        const id = document.getElementById('editId').value;
        if(id && confirm('Deseja excluir este agendamento?')) {
            await _supabase.from('agenda').delete().eq('id', id);
            closeModal();
            fetchAgenda();
        }
    }

    async function addBarbeiro() {
        const n = document.getElementById('new-prof-name').value;
        if(n) {
            await _supabase.from('barbeiros').insert([{nome: n}]);
            document.getElementById('new-prof-name').value = '';
            fetchBarbeiros();
        }
    }

    async function addServico() {
        const n = document.getElementById('new-service-name').value;
        const p = document.getElementById('new-service-price').value;
        if(n && p) {
            await _supabase.from('servicos').insert([{nome: n, preco: p}]);
            document.getElementById('new-service-name').value = '';
            document.getElementById('new-service-price').value = '';
            fetchServicos();
        }
    }

    function renderAgenda() {
        const opt = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('displayDate').innerText = currentDate.toLocaleDateString('pt-BR', opt);
        
        const tLab = document.getElementById('timeLabels');
        tLab.innerHTML = '';
        for(let h=8; h<=21; h++) tLab.innerHTML += `<div class="time-slot-label">${h}:00</div>`;

        const cols = document.getElementById('profsColumns');
        cols.innerHTML = barbeiros.length ? barbeiros.map(b => `
            <div class="prof-column">
                <div class="prof-header">${b.nome}</div>
                <div class="slots-area" onclick="openQuickAdd('${b.nome}', event)">
                    ${renderSlots(b.nome)}
                </div>
            </div>
        `).join('') : '<div style="padding:40px; color:var(--muted); font-size:0.8rem">Cadastre barbeiros na aba Equipe</div>';
    }

    function renderSlots(nome) {
        return agendaItems.filter(i => i.barbeiro_nome === nome).map(item => {
            const [h, m] = item.hora.split(':').map(Number);
            const top = (h - 8) * 60 + m;
            const hpx = item.duracao || 60;
            return `<div class="appointment" style="top:${top}px; height:${hpx}px" onclick="event.stopPropagation(); openEdit('${item.id}')">
                <div style="font-weight:bold">${item.cliente}</div>
                <div style="font-size:0.6rem; opacity:0.7">${item.hora}</div>
            </div>`;
        }).join('');
    }

    function openQuickAdd(prof, e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const h = Math.floor(y / 60) + 8;
        openModal('new', null, prof, `${h.toString().padStart(2, '0')}:00`);
    }

    function openEdit(id) {
        const item = agendaItems.find(i => i.id === id);
        openModal('edit', item);
    }

    function openModal(mode, item = null, prof = '', time = '10:00') {
        const sel = document.getElementById('appt-prof');
        sel.innerHTML = barbeiros.map(b => `<option ${b.nome === prof ? 'selected' : ''}>${b.nome}</option>`).join('');
        document.getElementById('modalAppt').classList.add('active');
        
        if(mode === 'edit') {
            document.getElementById('modalTitle').innerText = 'Editar Agendamento';
            document.getElementById('editId').value = item.id;
            document.getElementById('appt-client').value = item.cliente || '';
            document.getElementById('appt-time').value = item.hora;
            document.getElementById('appt-dur').value = item.duracao;
            document.getElementById('btnDelete').style.display = 'block';
        } else {
            document.getElementById('modalTitle').innerText = 'Novo Agendamento';
            document.getElementById('editId').value = '';
            document.getElementById('appt-client').value = '';
            document.getElementById('appt-time').value = time;
            document.getElementById('btnDelete').style.display = 'none';
        }
    }

    function closeModal() { document.getElementById('modalAppt').classList.remove('active'); }
    function changeDate(n) { currentDate.setDate(currentDate.getDate() + n); fetchAgenda(); }
    function showView(v) {
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        event.target.classList.add('active');
        if(v === 'agenda') fetchAgenda();
    }

    function renderEquipe() {
        document.getElementById('prof-list').innerHTML = barbeiros.map(b => `
            <div style="background:var(--card); padding:12px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; border:1px solid var(--border)">
                <span>${b.nome}</span>
            </div>
        `).join('');
    }
    function renderServicos() {
        document.getElementById('service-list').innerHTML = servicos.map(s => `
            <div style="background:var(--card); padding:12px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; border:1px solid var(--border)">
                <span>${s.nome} - R$ ${s.preco}</span>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
