- { margin:0; padding:0; box-sizing:border-box; }

body {
background: var(–dark);
font-family: ‘DM Sans’, sans-serif;
color: var(–text);
min-height: 100vh;
display: flex;
flex-direction: column;
overflow-x: hidden;
}

/* ── TOPBAR ── */
.topbar {
height: 58px;
background: var(–dark2);
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
padding: 0 24px;
gap: 20px;
position: sticky;
top: 0;
z-index: 100;
flex-shrink: 0;
}

.logo {
font-family: ‘Bebas Neue’, cursive;
font-size: 1.6rem;
letter-spacing: 3px;
color: var(–text);
white-space: nowrap;
}
.logo span { color: var(–gold); }

.topbar-sep {
width: 1px; height: 28px;
background: var(–border);
flex-shrink: 0;
}

.shop-name {
font-size: 0.85rem;
color: var(–muted);
white-space: nowrap;
}

.topbar-mid {
flex: 1;
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
}

.date-nav {
display: flex;
align-items: center;
gap: 12px;
background: var(–dark3);
border: 1px solid var(–border);
border-radius: 10px;
padding: 6px 14px;
}

.date-nav button {
background: none; border: none;
color: var(–muted); cursor: pointer;
font-size: 1rem; padding: 2px 6px;
border-radius: 6px;
transition: all 0.15s;
}
.date-nav button:hover { background: var(–dark4); color: var(–text); }

.date-nav .current-date {
font-size: 0.88rem;
font-weight: 500;
color: var(–text);
min-width: 160px;
text-align: center;
}

.today-btn {
background: var(–gold-d);
border: 1px solid rgba(201,151,58,0.3);
color: var(–gold-l);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.75rem;
font-weight: 600;
padding: 6px 14px;
border-radius: 8px;
cursor: pointer;
letter-spacing: 0.5px;
transition: all 0.15s;
}
.today-btn:hover { background: rgba(201,151,58,0.2); }

.topbar-right {
display: flex;
align-items: center;
gap: 10px;
flex-shrink: 0;
}

.btn-new {
background: linear-gradient(135deg, var(–gold), #b8832a);
border: none;
color: #0c0c0c;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.82rem;
font-weight: 700;
padding: 8px 18px;
border-radius: 8px;
cursor: pointer;
display: flex;
align-items: center;
gap: 6px;
transition: all 0.15s;
white-space: nowrap;
}
.btn-new:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,151,58,0.3); }

.avatar {
width: 34px; height: 34px;
background: var(–dark4);
border: 1px solid var(–border);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.85rem;
cursor: pointer;
color: var(–muted);
transition: border-color 0.15s;
}
.avatar:hover { border-color: var(–gold); }

/* ── STATS BAR ── */
.statsbar {
background: var(–dark2);
border-bottom: 1px solid var(–border);
padding: 10px 24px;
display: flex;
gap: 6px;
overflow-x: auto;
flex-shrink: 0;
}

.stat-card {
background: var(–dark3);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 18px;
display: flex;
align-items: center;
gap: 12px;
white-space: nowrap;
flex-shrink: 0;
}

.stat-icon {
font-size: 1.1rem;
width: 34px; height: 34px;
background: var(–dark4);
border-radius: 8px;
display: flex;
align-items: center;
justify-content: center;
}

.stat-info .stat-val {
font-size: 1.1rem;
font-weight: 600;
color: var(–text);
line-height: 1.2;
}
.stat-info .stat-label {
font-size: 0.7rem;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.5px;
}

.stat-card.gold .stat-icon { background: var(–gold-d); }
.stat-card.gold .stat-val { color: var(–gold-l); }

/* ── MAIN ── */
.main {
flex: 1;
display: flex;
overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
width: 220px;
background: var(–dark2);
border-right: 1px solid var(–border);
display: flex;
flex-direction: column;
flex-shrink: 0;
overflow-y: auto;
}

.sidebar-section {
padding: 20px 16px 10px;
}

.sidebar-label {
font-size: 0.65rem;
font-weight: 600;
color: var(–muted2);
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 8px;
padding: 0 8px;
}

.nav-item {
display: flex;
align-items: center;
gap: 10px;
padding: 9px 12px;
border-radius: 9px;
cursor: pointer;
font-size: 0.85rem;
color: var(–muted);
transition: all 0.15s;
margin-bottom: 2px;
}
.nav-item:hover { background: var(–dark3); color: var(–text); }
.nav-item.active {
background: var(–gold-d);
color: var(–gold-l);
border: 1px solid rgba(201,151,58,0.2);
}
.nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
.nav-badge {
margin-left: auto;
background: var(–gold);
color: #0c0c0c;
font-size: 0.65rem;
font-weight: 700;
padding: 2px 7px;
border-radius: 20px;
}

.sidebar-divider {
height: 1px;
background: var(–border);
margin: 8px 16px;
}

/* Profissionais no sidebar */
.prof-list { padding: 10px 16px 16px; }

.prof-item {
display: flex;
align-items: center;
gap: 10px;
padding: 8px 10px;
border-radius: 9px;
cursor: pointer;
transition: background 0.15s;
margin-bottom: 2px;
}
.prof-item:hover { background: var(–dark3); }

.prof-dot {
width: 10px; height: 10px;
border-radius: 50%;
flex-shrink: 0;
}

.prof-avatar {
width: 28px; height: 28px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.7rem;
font-weight: 600;
color: white;
flex-shrink: 0;
}

.prof-info { flex: 1; min-width: 0; }
.prof-name { font-size: 0.82rem; color: var(–text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prof-role { font-size: 0.7rem; color: var(–muted); }

.prof-count {
font-size: 0.72rem;
color: var(–muted);
background: var(–dark4);
padding: 2px 8px;
border-radius: 10px;
}

/* ── AGENDA AREA ── */
.agenda-wrap {
flex: 1;
display: flex;
flex-direction: column;
overflow: hidden;
background: var(–dark);
}

/* Hour header */
.agenda-header {
display: flex;
border-bottom: 1px solid var(–border);
background: var(–dark2);
flex-shrink: 0;
}

.time-gutter { width: 54px; flex-shrink: 0; }

.col-header {
flex: 1;
padding: 12px 8px;
display: flex;
align-items: center;
gap: 10px;
border-left: 1px solid var(–border);
min-width: 0;
}

.col-avatar {
width: 32px; height: 32px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.78rem;
font-weight: 700;
color: white;
flex-shrink: 0;
}

.col-info { min-width: 0; }
.col-name {
font-size: 0.82rem;
font-weight: 600;
color: var(–text);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.col-slots {
font-size: 0.68rem;
color: var(–muted);
}

/* Scrollable grid */
.agenda-grid-wrap {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
position: relative;
}

.agenda-grid {
display: flex;
position: relative;
min-height: 840px; /* 14h × 60px */
}

.time-col {
width: 54px;
flex-shrink: 0;
position: relative;
}

.time-slot {
height: 60px;
display: flex;
align-items: flex-start;
padding-top: 4px;
padding-right: 8px;
justify-content: flex-end;
}

.time-label {
font-size: 0.68rem;
color: var(–muted2);
white-space: nowrap;
}

.prof-col {
flex: 1;
border-left: 1px solid var(–border);
position: relative;
min-width: 0;
}

.hour-line {
position: absolute;
left: 0; right: 0;
height: 1px;
background: var(–border);
}

.half-line {
position: absolute;
left: 0; right: 0;
height: 1px;
background: rgba(255,255,255,0.02);
}

/* Current time */
.now-line {
position: absolute;
left: 0; right: 0;
height: 2px;
background: var(–gold);
z-index: 10;
box-shadow: 0 0 6px var(–gold);
}
.now-line::before {
content: ‘’;
position: absolute;
left: -4px; top: -4px;
width: 10px; height: 10px;
background: var(–gold);
border-radius: 50%;
box-shadow: 0 0 8px var(–gold);
}

/* Appointment card */
.appt {
position: absolute;
left: 4px; right: 4px;
border-radius: 8px;
padding: 6px 8px;
cursor: pointer;
overflow: hidden;
transition: all 0.15s;
border-left: 3px solid;
z-index: 5;
}
.appt:hover {
filter: brightness(1.1);
transform: translateX(1px);
z-index: 6;
}

.appt-name {
font-size: 0.78rem;
font-weight: 600;
color: white;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
.appt-service {
font-size: 0.68rem;
color: rgba(255,255,255,0.7);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
margin-top: 1px;
}
.appt-time {
font-size: 0.65rem;
color: rgba(255,255,255,0.5);
margin-top: 2px;
}

/* Empty slot on hover */
.empty-slot {
position: absolute;
left: 4px; right: 4px;
border-radius: 6px;
border: 1px dashed rgba(201,151,58,0.2);
cursor: pointer;
opacity: 0;
transition: opacity 0.15s;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.7rem;
color: var(–gold);
}
.prof-col:hover .empty-slot:hover { opacity: 1; }

/* ── MODAL ── */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.7);
z-index: 200;
display: none;
align-items: center;
justify-content: center;
backdrop-filter: blur(4px);
padding: 20px;
}
.modal-overlay.open { display: flex; }

.modal {
background: var(–dark2);
border: 1px solid var(–border);
border-radius: 16px;
width: 100%;
max-width: 440px;
padding: 28px;
animation: slideUp 0.25s ease;
}

@keyframes slideUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

.modal-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 24px;
}

.modal-header h3 {
font-family: ‘Bebas Neue’, cursive;
font-size: 1.6rem;
letter-spacing: 2px;
color: var(–text);
}

.modal-close {
background: var(–dark3);
border: 1px solid var(–border);
color: var(–muted);
width: 32px; height: 32px;
border-radius: 8px;
cursor: pointer;
font-size: 1rem;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
}
.modal-close:hover { background: var(–dark4); color: var(–text); }

.modal-form-group { margin-bottom: 16px; }
.modal-form-group label {
display: block;
font-size: 0.72rem;
font-weight: 600;
color: var(–muted);
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 7px;
}

.modal select,
.modal input {
width: 100%;
background: var(–dark3);
border: 1px solid rgba(255,255,255,0.07);
border-radius: 9px;
padding: 11px 14px;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.88rem;
outline: none;
transition: border-color 0.15s;
}
.modal select { cursor: pointer; }
.modal select option { background: var(–dark2); }
.modal input:focus,
.modal select:focus { border-color: var(–gold); }
.modal input::placeholder { color: var(–muted2); }

.modal-row { display: flex; gap: 12px; }
.modal-row .modal-form-group { flex: 1; }

.modal-footer {
display: flex;
gap: 10px;
margin-top: 24px;
}

.btn-cancel {
flex: 1;
padding: 12px;
background: var(–dark3);
border: 1px solid var(–border);
color: var(–muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.85rem;
border-radius: 9px;
cursor: pointer;
transition: all 0.15s;
}
.btn-cancel:hover { color: var(–text); }

.btn-save {
flex: 2;
padding: 12px;
background: linear-gradient(135deg, var(–gold), #b8832a);
border: none;
color: #0c0c0c;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.88rem;
font-weight: 700;
border-radius: 9px;
cursor: pointer;
transition: all 0.15s;
}
.btn-save:hover { box-shadow: 0 4px 16px rgba(201,151,58,0.3); }

/* Appt detail modal */
.appt-detail-header {
display: flex;
align-items: center;
gap: 14px;
margin-bottom: 20px;
}

.appt-detail-icon {
width: 48px; height: 48px;
border-radius: 12px;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.3rem;
flex-shrink: 0;
}

.appt-detail-info h4 {
font-size: 1.1rem;
font-weight: 600;
color: var(–text);
}

.appt-detail-info p {
font-size: 0.8rem;
color: var(–muted);
margin-top: 2px;
}

.detail-row {
display: flex;
align-items: center;
gap: 10px;
padding: 10px 0;
border-bottom: 1px solid var(–border);
font-size: 0.84rem;
}

.detail-row:last-of-type { border-bottom: none; }

.detail-row .detail-label {
color: var(–muted);
width: 100px;
flex-shrink: 0;
}

.detail-row .detail-val { color: var(–text); font-weight: 500; }

.status-badge {
display: inline-flex;
align-items: center;
gap: 6px;
padding: 4px 10px;
border-radius: 20px;
font-size: 0.72rem;
font-weight: 600;
}

.status-confirmado { background: rgba(16,185,129,0.15); color: #10b981; }
.status-pendente { background: rgba(245,158,11,0.15); color: #f59e0b; }
.status-cancelado { background: rgba(239,68,68,0.15); color: #ef4444; }

.whatsapp-btn {
display: flex;
align-items: center;
gap: 8px;
background: rgba(37,211,102,0.12);
border: 1px solid rgba(37,211,102,0.25);
color: #25d366;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.82rem;
font-weight: 600;
padding: 10px 16px;
border-radius: 9px;
cursor: pointer;
width: 100%;
margin-top: 16px;
transition: all 0.15s;
}
.whatsapp-btn:hover { background: rgba(37,211,102,0.2); }

/* Toast */
.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(–dark3);
border: 1px solid var(–border);
border-radius: 12px;
padding: 12px 20px;
font-size: 0.84rem;
color: var(–text);
z-index: 999;
transition: transform 0.3s ease;
display: flex;
align-items: center;
gap: 10px;
white-space: nowrap;
box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(–dark); }
::-webkit-scrollbar-thumb { background: var(–dark4); border-radius: 3px; }

@media (max-width: 900px) {
.sidebar { display: none; }
}
@media (max-width: 600px) {
.topbar { padding: 0 14px; gap: 10px; }
.shop-name, .topbar-sep { display: none; }
.statsbar { padding: 8px 14px; }
}
</style>

</head>

<div class="toast" id="toast">

<script>
// ── DATA ──────────────────────────────────────────
const PROFS = [
  { id:1, name:'João Silva',    initials:'JS', color:'#3b82f6', role:'Barbeiro Sênior' },
  { id:2, name:'Pedro Alves',   initials:'PA', color:'#10b981', role:'Barbeiro' },
  { id:3, name:'Lucas Costa',   initials:'LC', color:'#f59e0b', role:'Barbeiro' },
  { id:4, name:'Rafael Souza',  initials:'RS', color:'#ec4899', role:'Barbeiro' },
  { id:5, name:'Bruno Lima',    initials:'BL', color:'#8b5cf6', role:'Aprendiz' },
];

const SERVICES = [
  { id:1, name:'Corte Degradê',      price:45, duration:30 },
  { id:2, name:'Corte + Barba',      price:65, duration:60 },
  { id:3, name:'Barba Completa',     price:35, duration:30 },
  { id:4, name:'Hidratação Capilar', price:55, duration:45 },
  { id:5, name:'Pigmentação',        price:80, duration:90 },
  { id:6, name:'Corte Simples',      price:30, duration:30 },
];

const HOUR_START = 8;
const HOUR_END   = 22;
const HOURS      = HOUR_END - HOUR_START; // 14h

// Demo appointments for today
let currentDate = new Date();
let appointments = generateDemoAppts(currentDate);

function generateDemoAppts(date) {
  const d = fmt(date);
  return [
    { id:1, profId:1, serviceId:1, clientName:'Carlos Mendes',    phone:'(11) 98765-4321', date:d, hour:9,  min:0,  status:'confirmado' },
    { id:2, profId:1, serviceId:2, clientName:'Rodrigo Lima',     phone:'(11) 91234-5678', date:d, hour:10, min:30, status:'confirmado' },
    { id:3, profId:2, serviceId:3, clientName:'André Costa',      phone:'(11) 99887-6655', date:d, hour:9,  min:30, status:'confirmado' },
    { id:4, profId:2, serviceId:1, clientName:'Felipe Souza',     phone:'(11) 97654-3210', date:d, hour:11, min:0,  status:'confirmado' },
    { id:5, profId:3, serviceId:6, clientName:'Matheus Alves',    phone:'(11) 95432-1098', date:d, hour:10, min:0,  status:'confirmado' },
    { id:6, profId:3, serviceId:5, clientName:'Thiago Rocha',     phone:'(11) 93456-7890', date:d, hour:13, min:0,  status:'confirmado' },
    { id:7, profId:4, serviceId:2, clientName:'Gustavo Pereira',  phone:'(11) 92345-6789', date:d, hour:9,  min:0,  status:'confirmado' },
    { id:8, profId:4, serviceId:4, clientName:'Vinicius Santos',  phone:'(11) 98901-2345', date:d, hour:14, min:0,  status:'confirmado' },
    { id:9, profId:5, serviceId:1, clientName:'Diego Ferreira',   phone:'(11) 96789-0123', date:d, hour:11, min:30, status:'confirmado' },
    { id:10,profId:5, serviceId:3, clientName:'Bruno Carvalho',   phone:'(11) 94567-8901', date:d, hour:15, min:0,  status:'confirmado' },
    { id:11,profId:1, serviceId:3, clientName:'Paulo Martins',    phone:'(11) 93210-9876', date:d, hour:14, min:0,  status:'pendente' },
    { id:12,profId:2, serviceId:2, clientName:'Igor Nascimento',  phone:'(11) 91098-7654', date:d, hour:15, min:30, status:'pendente' },
  ];
}

function fmt(d) {
  return d.toISOString().split('T')[0];
}

let apptIdCounter = 20;

// ── RENDER ────────────────────────────────────────
function render() {
  renderDateLabel();
  renderHeader();
  renderGrid();
  renderSidebar();
  renderStats();
  scrollToNow();
}

function renderDateLabel() {
  const days = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const d = currentDate;
  const today = new Date();
  const isToday = fmt(d) === fmt(today);
  document.getElementById('currentDate').textContent =
    `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}${isToday ? ' — Hoje' : ''}`;
}

function renderHeader() {
  const hdr = document.getElementById('agendaHeader');
  hdr.innerHTML = '<div class="time-gutter"></div>';
  const dayAppts = appointments.filter(a => a.date === fmt(currentDate));
  PROFS.forEach(p => {
    const count = dayAppts.filter(a => a.profId === p.id).length;
    const div = document.createElement('div');
    div.className = 'col-header';
    div.innerHTML = `
      <div class="col-avatar" style="background:${p.color}">${p.initials}</div>
      <div class="col-info">
        <div class="col-name">${p.name}</div>
        <div class="col-slots">${count} agendamento${count !== 1 ? 's' : ''}</div>
      </div>`;
    hdr.appendChild(div);
  });
}

function renderGrid() {
  const grid = document.getElementById('agendaGrid');
  grid.innerHTML = '';

  // Time column
  const timeCol = document.createElement('div');
  timeCol.className = 'time-col';
  for (let h = HOUR_START; h <= HOUR_END; h++) {
    const slot = document.createElement('div');
    slot.className = 'time-slot';
    slot.innerHTML = `<span class="time-label">${String(h).padStart(2,'0')}:00</span>`;
    timeCol.appendChild(slot);
  }
  grid.appendChild(timeCol);

  const dayAppts = appointments.filter(a => a.date === fmt(currentDate));

  // Prof columns
  PROFS.forEach(prof => {
    const col = document.createElement('div');
    col.className = 'prof-col';
    col.style.height = HOURS * 60 + 'px';

    // Hour lines
    for (let h = 0; h <= HOURS; h++) {
      const line = document.createElement('div');
      line.className = 'hour-line';
      line.style.top = h * 60 + 'px';
      col.appendChild(line);
      if (h < HOURS) {
        const half = document.createElement('div');
        half.className = 'half-line';
        half.style.top = h * 60 + 30 + 'px';
        col.appendChild(half);
      }
    }

    // Now line (only today)
    if (fmt(currentDate) === fmt(new Date())) {
      const now = new Date();
      const mins = (now.getHours() - HOUR_START) * 60 + now.getMinutes();
      if (mins >= 0 && mins <= HOURS * 60) {
        const nowLine = document.createElement('div');
        nowLine.className = 'now-line';
        nowLine.style.top = mins + 'px';
        col.appendChild(nowLine);
      }
    }

    // Appointments
    dayAppts.filter(a => a.profId === prof.id).forEach(appt => {
      const svc = SERVICES.find(s => s.id === appt.serviceId);
      if (!svc) return;
      const top = (appt.hour - HOUR_START) * 60 + appt.min;
      const height = Math.max(svc.duration - 4, 24);

      const el = document.createElement('div');
      el.className = 'appt';
      el.style.top = top + 'px';
      el.style.height = height + 'px';
      el.style.background = hexToRgba(prof.color, 0.18);
      el.style.borderLeftColor = prof.color;
      el.innerHTML = `
        <div class="appt-name">${appt.clientName}</div>
        ${height > 36 ? `<div class="appt-service">${svc.name}</div>` : ''}
        ${height > 52 ? `<div class="appt-time">${String(appt.hour).padStart(2,'0')}:${String(appt.min).padStart(2,'0')} · ${svc.duration}min</div>` : ''}
      `;
      el.onclick = () => openDetail(appt, prof, svc);
      col.appendChild(el);
    });

    grid.appendChild(col);
  });
}

function renderSidebar() {
  const el = document.getElementById('sidebarProfs');
  const dayAppts = appointments.filter(a => a.date === fmt(currentDate));
  el.innerHTML = PROFS.map(p => {
    const count = dayAppts.filter(a => a.profId === p.id).length;
    return `<div class="prof-item">
      <div class="prof-avatar" style="background:${p.color}">${p.initials}</div>
      <div class="prof-info">
        <div class="prof-name">${p.name}</div>
        <div class="prof-role">${p.role}</div>
      </div>
      <div class="prof-count">${count}</div>
    </div>`;
  }).join('');
}

function renderStats() {
  const dayAppts = appointments.filter(a => a.date === fmt(currentDate));
  const total = dayAppts.length;
  const pending = dayAppts.filter(a => a.status === 'pendente').length;
  const done = dayAppts.filter(a => a.status === 'concluido').length;
  const revenue = dayAppts.reduce((sum, a) => {
    const svc = SERVICES.find(s => s.id === a.serviceId);
    return sum + (svc ? svc.price : 0);
  }, 0);
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statRevenue').textContent = 'R$ ' + revenue.toFixed(0);
  document.getElementById('navBadge').textContent = total;
}

function scrollToNow() {
  if (fmt(currentDate) !== fmt(new Date())) return;
  const now = new Date();
  const mins = (now.getHours() - HOUR_START) * 60 + now.getMinutes();
  const wrap = document.getElementById('agendaGridWrap');
  setTimeout(() => { wrap.scrollTop = Math.max(0, mins - 120); }, 100);
}

// ── NAVIGATION ───────────────────────────────────
function changeDay(delta) {
  currentDate = new Date(currentDate);
  currentDate.setDate(currentDate.getDate() + delta);
  // Generate demo appts for new day if none
  const d = fmt(currentDate);
  if (!appointments.find(a => a.date === d)) {
    const newAppts = generateDemoAppts(currentDate);
    // randomize slightly
    newAppts.forEach(a => { a.hour = Math.min(20, a.hour + Math.floor(Math.random()*2)); });
    appointments = appointments.concat(newAppts);
  }
  render();
}

function goToday() {
  currentDate = new Date();
  render();
}

// ── NEW MODAL ─────────────────────────────────────
function openNewModal() {
  // Populate profissional select
  const profSel = document.getElementById('newProf');
  profSel.innerHTML = PROFS.map(p => `<option value="${p.id}">${p.name}</option>`).join('');

  // Populate services
  const svcSel = document.getElementById('newService');
  svcSel.innerHTML = SERVICES.map(s => `<option value="${s.id}">${s.name} — R$ ${s.price} (${s.duration}min)</option>`).join('');
  updateDuration();

  // Populate time slots
  const timeSel = document.getElementById('newTime');
  timeSel.innerHTML = '';
  for (let h = HOUR_START; h < HOUR_END; h++) {
    for (let m of [0, 30]) {
      const label = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      timeSel.innerHTML += `<option value="${h},${m}">${label}</option>`;
    }
  }

  document.getElementById('newModal').classList.add('open');
}

function closeNewModal() {
  document.getElementById('newModal').classList.remove('open');
}

function updateDuration() {
  const svcId = parseInt(document.getElementById('newService').value);
  const svc = SERVICES.find(s => s.id === svcId);
  document.getElementById('newDuration').value = svc ? `${svc.duration} min` : '—';
}

function saveAppt() {
  const name  = document.getElementById('newClientName').value.trim();
  const phone = document.getElementById('newClientPhone').value.trim();
  const profId = parseInt(document.getElementById('newProf').value);
  const svcId  = parseInt(document.getElementById('newService').value);
  const [hour, min] = document.getElementById('newTime').value.split(',').map(Number);

  if (!name) return showToast('⚠️ Informe o nome do cliente');
  if (!phone) return showToast('⚠️ Informe o WhatsApp do cliente');

  // Check conflict
  const svc = SERVICES.find(s => s.id === svcId);
  const newStart = hour * 60 + min;
  const newEnd   = newStart + svc.duration;
  const conflict = appointments.filter(a => a.profId === profId && a.date === fmt(currentDate))
    .some(a => {
      const s2 = SERVICES.find(s => s.id === a.serviceId);
      const aStart = a.hour * 60 + a.min;
      const aEnd   = aStart + (s2 ? s2.duration : 30);
      return newStart < aEnd && newEnd > aStart;
    });

  if (conflict) return showToast('⚠️ Conflito de horário! Escolha outro slot.');

  const appt = {
    id: ++apptIdCounter, profId, serviceId: svcId,
    clientName: name, phone,
    date: fmt(currentDate), hour, min, status: 'confirmado'
  };
  appointments.push(appt);
  closeNewModal();
  render();
  showToast('✅ Agendamento criado com sucesso!');

  // Clear form
  document.getElementById('newClientName').value = '';
  document.getElementById('newClientPhone').value = '';
}

// ── DETAIL MODAL ─────────────────────────────────
function openDetail(appt, prof, svc) {
  const endMin = appt.hour * 60 + appt.min + svc.duration;
  const endH   = Math.floor(endMin / 60);
  const endM   = endMin % 60;
  const statusMap = { confirmado:'Confirmado', pendente:'Pendente', cancelado:'Cancelado', concluido:'Concluído' };
  const statusClass = { confirmado:'status-confirmado', pendente:'status-pendente', cancelado:'status-cancelado', concluido:'status-confirmado' };

  document.getElementById('detailContent').innerHTML = `
    <div class="appt-detail-header">
      <div class="appt-detail-icon" style="background:${hexToRgba(prof.color, 0.15)}">✂️</div>
      <div class="appt-detail-info">
        <h4>${appt.clientName}</h4>
        <p>${svc.name} com ${prof.name}</p>
      </div>
    </div>
    <div class="detail-row">
      <span class="detail-label">📅 Data</span>
      <span class="detail-val">${formatDate(appt.date)}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">⏰ Horário</span>
      <span class="detail-val">${String(appt.hour).padStart(2,'0')}:${String(appt.min).padStart(2,'0')} → ${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">✂️ Serviço</span>
      <span class="detail-val">${svc.name} · ${svc.duration}min</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">💰 Valor</span>
      <span class="detail-val" style="color:var(--gold-l)">R$ ${svc.price},00</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">👤 Barbeiro</span>
      <span class="detail-val">${prof.name}</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Status</span>
      <span class="detail-val">
        <span class="status-badge ${statusClass[appt.status] || ''}">
          ${appt.status === 'confirmado' ? '✓' : appt.status === 'pendente' ? '⏳' : '✕'}
          ${statusMap[appt.status] || appt.status}
        </span>
      </span>
    </div>
    <div class="detail-row">
      <span class="detail-label">📱 WhatsApp</span>
      <span class="detail-val">${appt.phone || 'Não informado'}</span>
    </div>
    <button class="whatsapp-btn" onclick="sendWhatsapp('${appt.phone}', '${appt.clientName}', '${svc.name}', '${String(appt.hour).padStart(2,'0')}:${String(appt.min).padStart(2,'0')}')">
      💬 Enviar lembrete pelo WhatsApp
    </button>
    <div class="modal-footer" style="margin-top:12px;">
      <button class="btn-cancel" onclick="cancelAppt(${appt.id})">✕ Cancelar agendamento</button>
      <button class="btn-save" onclick="completeAppt(${appt.id})">✓ Marcar como concluído</button>
    </div>
  `;
  document.getElementById('detailModal').classList.add('open');
}

function closeDetailModal() {
  document.getElementById('detailModal').classList.remove('open');
}

function cancelAppt(id) {
  const a = appointments.find(x => x.id === id);
  if (a) a.status = 'cancelado';
  closeDetailModal();
  render();
  showToast('🗑 Agendamento cancelado');
}

function completeAppt(id) {
  const a = appointments.find(x => x.id === id);
  if (a) a.status = 'concluido';
  closeDetailModal();
  render();
  showToast('✅ Marcado como concluído!');
}

function sendWhatsapp(phone, name, service, time) {
  const clean = phone.replace(/\D/g,'');
  const msg = encodeURIComponent(`Olá ${name}! 👋\nLembrando do seu agendamento:\n✂️ ${service}\n⏰ ${time}\n\nTe esperamos! — BarberFlow`);
  window.open(`https://wa.me/55${clean}?text=${msg}`, '_blank');
}

// ── HELPERS ───────────────────────────────────────
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function formatDate(str) {
  const [y,m,d] = str.split('-');
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${d} de ${months[parseInt(m)-1]} de ${y}`;
}

function maskPhone(input) {
  let v = input.value.replace(/\D/g,'').slice(0,11);
  if (v.length <= 2) v = v.replace(/(\d{0,2})/,'($1');
  else if (v.length <= 7) v = v.replace(/(\d{2})(\d{0,5})/,'($1) $2');
  else v = v.replace(/(\d{2})(\d{5})(\d{0,4})/,'($1) $2-$3');
  input.value = v;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// Close modals on overlay click
document.getElementById('newModal').addEventListener('click', function(e) {
  if (e.target === this) closeNewModal();
});
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeDetailModal();
});

// Update now-line every minute
setInterval(() => render(), 60000);

// INIT
render();
</script>
