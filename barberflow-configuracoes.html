<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow — Configurações</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #0c0c0c; --dark2: #141414; --dark3: #1c1c1c; --gold: #c9973a;
            --gold-l: #e8b04a; --text: #f0ece4; --muted: #666; --border: rgba(255,255,255,0.07);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--dark); font-family: 'DM Sans', sans-serif; color: var(--text); }

        .topbar { height: 60px; background: var(--dark2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; position: sticky; top:0; z-index:10; }
        .logo { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        .layout { display: flex; max-width: 1000px; margin: 0 auto; padding: 20px; gap: 20px; }
        
        .nav { width: 200px; }
        .nav-item { padding: 12px; border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 0.9rem; margin-bottom: 5px; }
        .nav-item.active { background: rgba(201,151,58,0.1); color: var(--gold); border: 1px solid rgba(201,151,58,0.2); }

        .content { flex: 1; }
        .card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card-title { font-family: 'Bebas Neue', cursive; font-size: 1.2rem; margin-bottom: 15px; color: var(--gold); }

        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); }
        .btn-add { width: 100%; padding: 12px; background: transparent; border: 1px dashed var(--gold); color: var(--gold); border-radius: 8px; cursor: pointer; margin-top: 10px; }
        
        /* Modal Simple */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal.active { display: flex; }
        .modal-content { background: var(--dark2); padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--border); }
        
        input, select { width: 100%; background: var(--dark3); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; margin-bottom: 15px; outline: none; }
        .btn-save { width: 100%; background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 10px 20px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="logo">BARBER<span>FLOW</span></div>
</div>

<div class="layout">
    <div class="nav">
        <div class="nav-item active" onclick="tab('equipe')">👥 Equipe</div>
        <div class="nav-item" onclick="tab('servicos')">✂️ Serviços</div>
    </div>

    <div class="content">
        <!-- ABA EQUIPE -->
        <div id="tab-equipe" class="tab-content">
            <div class="card">
                <div class="card-title">Barbeiros da Casa</div>
                <div id="listProfs">Carregando...</div>
                <button class="btn-add" onclick="openModal('prof')">+ Adicionar Barbeiro</button>
            </div>
        </div>

        <!-- ABA SERVIÇOS -->
        <div id="tab-servicos" class="tab-content" style="display:none">
            <div class="card">
                <div class="card-title">Serviços Oferecidos</div>
                <div id="listServs">Carregando...</div>
                <button class="btn-add" onclick="openModal('serv')">+ Adicionar Serviço</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL GERAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-bottom: 15px;">Novo</h3>
        <div id="modalFields"></div>
        <button class="btn-save" onclick="handleSave()">Salvar</button>
        <button onclick="closeModal()" style="background:transparent; color:white; border:none; width:100%; margin-top:10px; cursor:pointer; font-size:0.8rem;">Cancelar</button>
    </div>
</div>

<div class="toast" id="toast">Sucesso!</div>

<script>
    const SB_URL = 'https://pvsmbsoqhkcpdeztosrg.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2c21ic29xaGtjcGRlenRvc3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NTEyOTUsImV4cCI6MjA4ODQyNzI5NX0.UufvlSa0Eyk7JPFrMVe3TmsuYTpWppi3PA6I2uhcqa4';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let modalType = '';

    async function loadData() {
        // Carregar Profissionais
        const { data: profs } = await supabaseClient.from('barbeiros').select('*');
        document.getElementById('listProfs').innerHTML = profs?.map(p => `
            <div class="item-row">
                <span>${p.nome} (${p.especialidade || 'Barbeiro'})</span>
                <button onclick="deleteItem('barbeiros', ${p.id})" style="background:none; border:none; cursor:pointer;">🗑️</button>
            </div>
        `).join('') || 'Nenhum cadastrado.';

        // Carregar Serviços
        const { data: servs } = await supabaseClient.from('servicos').select('*');
        document.getElementById('listServs').innerHTML = servs?.map(s => `
            <div class="item-row">
                <span>${s.nome} - R$ ${s.preco}</span>
                <button onclick="deleteItem('servicos', ${s.id})" style="background:none; border:none; cursor:pointer;">🗑️</button>
            </div>
        `).join('') || 'Nenhum cadastrado.';
    }

    function tab(name) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-'+name).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    function openModal(type) {
        modalType = type;
        const fields = document.getElementById('modalFields');
        if(type === 'prof') {
            document.getElementById('modalTitle').innerText = 'Novo Barbeiro';
            fields.innerHTML = `<input type="text" id="fNome" placeholder="Nome do Barbeiro">`;
        } else {
            document.getElementById('modalTitle').innerText = 'Novo Serviço';
            fields.innerHTML = `
                <input type="text" id="fNome" placeholder="Ex: Corte Degradê">
                <input type="number" id="fPreco" placeholder="Preço (Ex: 45)">
            `;
        }
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }

    async function handleSave() {
        const nome = document.getElementById('fNome').value;
        if(!nome) return alert("Preencha o nome");

        if(modalType === 'prof') {
            await supabaseClient.from('barbeiros').insert([{ nome: nome }]);
        } else {
            const preco = document.getElementById('fPreco').value;
            await supabaseClient.from('servicos').insert([{ nome: nome, preco: parseFloat(preco) }]);
        }
        
        closeModal();
        showToast();
        loadData();
    }

    async function deleteItem(table, id) {
        if(!confirm("Deseja excluir?")) return;
        await supabaseClient.from(table).delete().eq('id', id);
        loadData();
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    loadData();
</script>
</body>
</html>
