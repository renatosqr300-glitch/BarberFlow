<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia do João — Agendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #0c0c0c;
            --dark2: #141414;
            --dark3: #1c1c1c;
            --dark4: #242424;
            --gold: #c9973a;
            --gold-l: #e8b04a;
            --gold-d: rgba(201,151,58,0.12);
            --border: rgba(255,255,255,0.07);
            --text: #f0ece4;
            --muted: #777;
            --green: #10b981;
            --radius: 14px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--dark);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* HERO */
        .hero {
            background: linear-gradient(160deg, #1a1408 0%, var(--dark2) 60%);
            border-bottom: 1px solid var(--border);
            padding: 32px 20px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,151,58,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .shop-avatar {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--gold), #8a5f1a);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 16px;
            position: relative;
            box-shadow: 0 8px 32px rgba(201,151,58,0.3);
        }

        .shop-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 2rem;
            letter-spacing: 3px;
            color: var(--text);
        }

        .shop-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .rating {
            background: var(--gold-d);
            border: 1px solid rgba(201,151,58,0.25);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            color: var(--gold-l);
            font-weight: 600;
        }

        /* STEPS INDICATOR */
        .steps-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: var(--dark2);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.35;
            transition: all 0.3s;
        }

        .step.active { opacity: 1; }
        .step.done { opacity: 0.7; color: var(--green); }

        .step-num {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: var(--dark4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .step.active .step-num { background: var(--gold); color: #000; }
        .step.done .step-num { background: var(--green); color: #fff; }

        .step-label { font-size: 0.7rem; font-weight: 600; }
        .step-sep { width: 20px; height: 1px; background: var(--border); margin: 0 8px; }

        /* SCREENS */
        .content { max-width: 500px; margin: 0 auto; padding: 24px 16px; }
        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 4px; }
        .section-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; }

        /* CARDS */
        .prof-grid { display: grid; gap: 12px; }
        .card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card.selected { border-color: var(--gold); background: var(--gold-d); }

        .avatar-circle {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
        }

        /* GRID TIME */
        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .time-chip {
            background: var(--dark2);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.85rem;
        }
        .time-chip.selected { background: var(--gold); color: #000; border-color: var(--gold); }
        .time-chip.busy { opacity: 0.2; pointer-events: none; }

        /* DATE STRIP */
        .date-strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .date-chip {
            min-width: 60px;
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }
        .date-chip.selected { border-color: var(--gold); background: var(--gold-d); color: var(--gold-l); }

        /* FORM */
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
        .input-group input {
            width: 100%; background: var(--dark3); border: 1px solid var(--border);
            padding: 14px; border-radius: 10px; color: #fff; outline: none;
        }
        .input-group input:focus { border-color: var(--gold); }

        /* FOOTER BUTTON */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 15px; background: var(--dark); border-top: 1px solid var(--border);
            display: flex; justify-content: center;
        }
        .btn-primary {
            width: 100%; max-width: 470px;
            background: var(--gold); color: #000;
            border: none; padding: 16px; border-radius: 12px;
            font-weight: 700; font-size: 1rem; cursor: pointer;
        }
        .btn-primary:disabled { opacity: 0.3; }

        /* SUCCESS */
        .success-card { text-align: center; padding: 20px 0; }
        .check-large { 
            width: 70px; height: 70px; background: var(--green); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; margin: 0 auto 20px; font-size: 2rem;
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="shop-avatar">✂️</div>
    <div class="shop-name">Barbearia do João</div>
    <div class="shop-meta">
        <div class="rating">⭐ 4.9</div>
        <div style="font-size: 0.8rem; color: var(--muted)">📍 São Paulo, SP</div>
    </div>
</div>

<div class="steps-bar">
    <div class="step active" id="s1"><div class="step-num">1</div><div class="step-label">Equipe</div></div>
    <div class="step-sep"></div>
    <div class="step" id="s2"><div class="step-num">2</div><div class="step-label">Serviço</div></div>
    <div class="step-sep"></div>
    <div class="step" id="s3"><div class="step-num">3</div><div class="step-label">Hora</div></div>
</div>

<div class="content">
    <!-- TELA 1 -->
    <div class="screen active" id="screen1">
        <h2 class="section-title">Quem vai te atender?</h2>
        <p class="section-sub">Selecione seu barbeiro de preferência</p>
        <div class="prof-grid" id="profList"></div>
    </div>

    <!-- TELA 2 -->
    <div class="screen" id="screen2">
        <h2 class="section-title">O que vamos fazer?</h2>
        <p class="section-sub">Escolha os serviços desejados</p>
        <div class="prof-grid" id="serviceList"></div>
    </div>

    <!-- TELA 3 -->
    <div class="screen" id="screen3">
        <h2 class="section-title">Quando?</h2>
        <p class="section-sub">Selecione o melhor horário para você</p>
        <div class="date-strip" id="dateStrip"></div>
        <div class="time-grid" id="timeGrid"></div>
    </div>

    <!-- TELA 4 -->
    <div class="screen" id="screen4">
        <h2 class="section-title">Finalizar</h2>
        <p class="section-sub">Confirme seus dados para o agendamento</p>
        <div class="input-group">
            <label>Seu Nome</label>
            <input type="text" id="userName" placeholder="Como quer ser chamado?">
        </div>
        <div class="input-group">
            <label>WhatsApp</label>
            <input type="tel" id="userPhone" placeholder="(00) 00000-0000">
        </div>
    </div>

    <!-- TELA SUCESSO -->
    <div class="screen" id="screenSuccess">
        <div class="success-card">
            <div class="check-large">✓</div>
            <h2 class="section-title">Confirmado!</h2>
            <p class="section-sub" id="successMsg"></p>
            <button class="btn-primary" style="background: #25d366; color: #fff; margin-top: 20px" onclick="window.location.reload()">Fazer Novo Agendamento</button>
        </div>
    </div>
</div>

<div class="bottom-bar" id="bottomBar">
    <button class="btn-primary" id="btnAction" disabled onclick="nextStep()">Continuar</button>
</div>

<script>
    const DATA = {
        profs: [
            { id: 1, name: 'João Silva', role: 'Master', color: '#3b82f6' },
            { id: 2, name: 'Pedro Alves', role: 'Barbeiro', color: '#10b981' },
            { id: 3, name: 'Lucas Costa', role: 'Barbeiro', color: '#f59e0b' }
        ],
        services: [
            { id: 1, name: 'Corte Degradê', price: 45, time: '30min' },
            { id: 2, name: 'Corte + Barba', price: 70, time: '60min' },
            { id: 3, name: 'Barba', price: 30, time: '20min' }
        ]
    };

    let state = { step: 1, prof: null, service: null, date: null, time: null };

    function init() {
        renderProfs();
        renderServices();
        renderDates();
    }

    function renderProfs() {
        const html = DATA.profs.map(p => `
            <div class="card" onclick="selectProf(${p.id})">
                <div class="avatar-circle" style="background:${p.color}">${p.name[0]}</div>
                <div style="flex:1">
                    <div style="font-weight:600">${p.name}</div>
                    <div style="font-size:0.75rem; color:var(--muted)">${p.role}</div>
                </div>
            </div>
        `).join('');
        document.getElementById('profList').innerHTML = html;
    }

    function selectProf(id) {
        state.prof = DATA.profs.find(p => p.id === id);
        document.querySelectorAll('#profList .card').forEach((c, i) => {
            c.classList.toggle('selected', DATA.profs[i].id === id);
        });
        document.getElementById('btnAction').disabled = false;
    }

    function renderServices() {
        const html = DATA.services.map(s => `
            <div class="card" onclick="selectService(${s.id})">
                <div style="flex:1">
                    <div style="font-weight:600">${s.name}</div>
                    <div style="font-size:0.75rem; color:var(--muted)">${s.time}</div>
                </div>
                <div style="color:var(--gold-l); font-weight:bold">R$ ${s.price}</div>
            </div>
        `).join('');
        document.getElementById('serviceList').innerHTML = html;
    }

    function selectService(id) {
        state.service = DATA.services.find(s => s.id === id);
        document.querySelectorAll('#serviceList .card').forEach((c, i) => {
            c.classList.toggle('selected', DATA.services[i].id === id);
        });
        document.getElementById('btnAction').disabled = false;
    }

    function renderDates() {
        const strip = document.getElementById('dateStrip');
        const today = new Date();
        for(let i=0; i<7; i++) {
            const d = new Date(today); d.setDate(today.getDate()+i);
            const chip = document.createElement('div');
            chip.className = 'date-chip';
            chip.innerHTML = `<div style="font-size:0.6rem; opacity:0.6">${d.toLocaleDateString('pt-BR', {weekday:'short'})}</div><div style="font-weight:bold">${d.getDate()}</div>`;
            chip.onclick = () => {
                document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('selected'));
                chip.classList.add('selected');
                state.date = d.toLocaleDateString();
                renderTimes();
            };
            strip.appendChild(chip);
        }
    }

    function renderTimes() {
        const grid = document.getElementById('timeGrid');
        grid.innerHTML = '';
        ['09:00', '09:30', '10:00', '11:00', '14:00', '15:30', '16:00', '17:30'].forEach(t => {
            const chip = document.createElement('div');
            chip.className = 'time-chip';
            chip.innerText = t;
            chip.onclick = () => {
                document.querySelectorAll('.time-chip').forEach(c => c.classList.remove('selected'));
                chip.classList.add('selected');
                state.time = t;
                document.getElementById('btnAction').disabled = false;
            };
            grid.appendChild(chip);
        });
    }

    function nextStep() {
        if(state.step < 4) {
            document.getElementById(`screen${state.step}`).classList.remove('active');
            document.getElementById(`s${state.step}`).classList.add('done');
            state.step++;
            document.getElementById(`screen${state.step}`).classList.add('active');
            document.getElementById('btnAction').disabled = (state.step === 3 && !state.time) || (state.step === 4 && false);
            if(state.step === 4) document.getElementById('btnAction').innerText = 'Finalizar Agendamento';
        } else {
            finish();
        }
    }

    function finish() {
        const name = document.getElementById('userName').value;
        if(!name) return alert('Por favor, digite seu nome');
        
        document.getElementById('screen4').classList.remove('active');
        document.getElementById('bottomBar').style.display = 'none';
        document.getElementById('screenSuccess').classList.add('active');
        document.getElementById('successMsg').innerText = `${name}, seu horário com ${state.prof.name} para ${state.service.name} foi agendado para o dia ${state.date} às ${state.time}.`;
    }

    init();
</script>
</body>
</html>
