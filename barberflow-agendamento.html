<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow PRO - Cloud</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0c0c0c; color: white; margin: 0; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        select option { background: #141414; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Pegando as funções do React disponíveis no navegador
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURAÇÃO MANUAL DO SUPABASE ---
        const SB_URL = 'https://pvsmbsoqhkcpdeztosrg.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2c21ic29xaGtjcGRlenRvc3JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NTEyOTUsImV4cCI6MjA4ODQyNzI5NX0.UufvlSa0Eyk7JPFrMVe3TmsuYTpWppi3PA6I2uhcqa4';
        
        // Inicializando o Supabase pela versão CDN
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // Componente de Ícones em SVG (para substituir a biblioteca Lucide que não roda nativa no HTML)
        const Icon = ({ name, size = 20 }) => {
            const icons = {
                plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
                chevronLeft: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>,
                chevronRight: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [view, setView] = useState('agenda');
            const [loading, setLoading] = useState(true);
            const [currentDate, setCurrentDate] = useState(new Date());
            
            const [barbeiros, setBarbeiros] = useState([]);
            const [servicos, setServicos] = useState([]);
            const [agenda, setAgenda] = useState([]);

            const [modalOpen, setModalOpen] = useState(false);
            
            // Estado simplificado (Sem WhatsApp, pronto para IDs em String/UUID)
            const [form, setForm] = useState({ 
                cliente: '', barbeiro_id: '', servico_id: '', hora: '09:00' 
            });

            // Função para evitar erro de fuso horário
            const getLocalDateString = (date) => {
                const offset = date.getTimezoneOffset();
                const localDate = new Date(date.getTime() - (offset * 60 * 1000));
                return localDate.toISOString().split('T')[0];
            };

            const fetchInitialData = async () => {
                setLoading(true);
                try {
                    const { data: b } = await supabaseClient.from('barbeiros').select('*');
                    const { data: s } = await supabaseClient.from('servicos').select('*');
                    
                    setBarbeiros(b || []);
                    setServicos(s || []);
                    
                    if (b && b.length > 0) setForm(prev => ({ ...prev, barbeiro_id: b[0].id }));
                    if (s && s.length > 0) setForm(prev => ({ ...prev, servico_id: s[0].id }));
                } catch (err) {
                    alert("Erro ao carregar dados: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const fetchAgenda = async () => {
                const dateStr = getLocalDateString(currentDate);
                const { data } = await supabaseClient.from('agenda').select('*').eq('data', dateStr);
                setAgenda(data || []);
            };

            useEffect(() => {
                fetchInitialData();
            }, []);

            useEffect(() => {
                if (barbeiros.length > 0) fetchAgenda();
            }, [currentDate, barbeiros]);

            const handleSave = async () => {
                if (!form.cliente) return alert("Preencha o Nome do Cliente!");
                if (!form.barbeiro_id || !form.servico_id) return alert("Falta cadastrar barbeiro ou serviço!");
                
                const payload = {
                    data: getLocalDateString(currentDate),
                    cliente: form.cliente,
                    barbeiro_id: form.barbeiro_id, // Enviando como UUID (string)
                    servico_id: form.servico_id,   // Enviando como UUID (string)
                    hora: form.hora,
                    status: 'confirmado'
                };

                const { error } = await supabaseClient.from('agenda').insert([payload]);
                
                if (error) {
                    alert("Erro ao salvar: " + error.message);
                } else {
                    setModalOpen(false);
                    setForm({ ...form, cliente: '' }); // Limpa o nome para o próximo
                    fetchAgenda();
                    alert("Agendado com sucesso!");
                }
            };

            const timeSlots = useMemo(() => {
                const slots = [];
                for (let i = 8; i <= 20; i++) {
                    slots.push(`${i.toString().padStart(2, '0')}:00`);
                    slots.push(`${i.toString().padStart(2, '0')}:30`);
                }
                return slots;
            }, []);

            if (loading) return (
                <div className="min-h-screen bg-[#0c0c0c] flex flex-col items-center justify-center text-[#c9973a]">
                    <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#c9973a] mb-4"></div>
                    <p className="font-bold tracking-widest uppercase text-xs">Sincronizando...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#0c0c0c] text-white font-sans pb-20">
                    <header className="p-6 flex justify-between items-center border-b border-white/5">
                        <h1 className="text-2xl font-black tracking-tighter">BARBER<span className="text-[#c9973a]">FLOW</span></h1>
                        <button onClick={() => setModalOpen(true)} className="bg-[#c9973a] text-black p-2 rounded-lg">
                            <Icon name="plus" size={24} />
                        </button>
                    </header>

                    <nav className="flex border-b border-white/5">
                        <button onClick={() => setView('agenda')} className={`flex-1 py-4 text-xs font-bold uppercase tracking-widest ${view === 'agenda' ? 'text-[#c9973a] border-b-2 border-[#c9973a]' : 'text-gray-500'}`}>Agenda</button>
                        <button onClick={() => setView('equipe')} className={`flex-1 py-4 text-xs font-bold uppercase tracking-widest ${view === 'equipe' ? 'text-[#c9973a] border-b-2 border-[#c9973a]' : 'text-gray-500'}`}>Equipe</button>
                    </nav>

                    {view === 'agenda' && (
                        <main className="p-4">
                            <div className="flex items-center justify-between mb-6 bg-white/5 p-4 rounded-2xl">
                                <button onClick={() => { const d = new Date(currentDate); d.setDate(d.getDate() - 1); setCurrentDate(d); }} className="text-[#c9973a]"><Icon name="chevronLeft" /></button>
                                <div className="text-center">
                                    <p className="text-[#c9973a] text-xs font-bold uppercase">{currentDate.toLocaleDateString('pt-BR', { weekday: 'long' })}</p>
                                    <p className="text-xl font-bold">{currentDate.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long' })}</p>
                                </div>
                                <button onClick={() => { const d = new Date(currentDate); d.setDate(d.getDate() + 1); setCurrentDate(d); }} className="text-[#c9973a]"><Icon name="chevronRight" /></button>
                            </div>

                            <div className="space-y-3">
                                {timeSlots.map(slot => {
                                    const appt = agenda.find(a => a.hora === slot);
                                    return (
                                        <div key={slot} className={`p-4 rounded-xl border ${appt ? 'border-[#c9973a]/30 bg-[#c9973a]/5' : 'border-white/5 bg-white/2'}`}>
                                            <div className="flex justify-between items-center">
                                                <span className="text-gray-500 font-mono text-sm">{slot}</span>
                                                {appt ? (
                                                    <div className="text-right">
                                                        <p className="font-bold text-[#c9973a]">{appt.cliente}</p>
                                                    </div>
                                                ) : (
                                                    <span className="text-white/20 text-[10px] uppercase font-bold tracking-widest">Disponível</span>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </main>
                    )}

                    {view === 'equipe' && (
                        <main className="p-6 space-y-4">
                            {barbeiros.length === 0 ? <p className="text-center text-gray-500 text-sm mt-10">Nenhum barbeiro cadastrado no banco de dados.</p> : null}
                            {barbeiros.map(b => (
                                <div key={b.id} className="bg-white/5 p-4 rounded-2xl flex items-center gap-4">
                                    <div className="w-12 h-12 bg-[#c9973a] rounded-full flex items-center justify-center text-black font-bold text-xl">
                                        {b.nome.charAt(0)}
                                    </div>
                                    <div>
                                        <p className="font-bold">{b.nome}</p>
                                        <p className="text-xs text-gray-500 uppercase">{b.especialidade || 'Barbeiro'}</p>
                                    </div>
                                </div>
                            ))}
                        </main>
                    )}

                    {modalOpen && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
                            <div className="bg-[#141414] w-full max-w-md rounded-3xl p-6 border border-white/10">
                                <h2 className="text-xl font-bold mb-6 text-[#c9973a]">Novo Agendamento</h2>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] text-gray-500 uppercase font-bold mb-2 block">Nome do Cliente</label>
                                        <input 
                                            type="text" 
                                            className="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none text-white"
                                            value={form.cliente}
                                            onChange={e => setForm({...form, cliente: e.target.value})}
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] text-gray-500 uppercase font-bold mb-2 block">Barbeiro</label>
                                            <select 
                                                className="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none text-white"
                                                value={form.barbeiro_id}
                                                onChange={e => setForm({...form, barbeiro_id: e.target.value})}
                                            >
                                                {barbeiros.map(b => <option key={b.id} value={b.id}>{b.nome}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] text-gray-500 uppercase font-bold mb-2 block">Hora</label>
                                            <select 
                                                className="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none text-white"
                                                value={form.hora}
                                                onChange={e => setForm({...form, hora: e.target.value})}
                                            >
                                                {timeSlots.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-3 mt-8">
                                    <button onClick={() => setModalOpen(false)} className="flex-1 py-4 text-xs font-bold uppercase text-gray-500">Cancelar</button>
                                    <button onClick={handleSave} className="flex-1 bg-[#c9973a] text-black px-8 py-4 rounded-2xl font-bold uppercase text-xs">Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
