<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberFlow — Agendamento para Barbearias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark: #0a0a0a;
            --dark2: #111111;
            --dark3: #1a1a1a;
            --dark4: #222222;
            --gold: #c9973a;
            --gold-l: #e8b04a;
            --gold-d: rgba(201,151,58,0.12);
            --border: rgba(255,255,255,0.07);
            --text: #f0ece4;
            --muted: #a3a3a3;
            --green: #10b981;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--dark);
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased; /* Melhora a fonte no iPhone */
            -moz-osx-font-smoothing: grayscale;
        }

        /* Corrigindo os erros de variáveis no CSS */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }

        nav.scrolled {
            background: rgba(10,10,10,0.92);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
            padding: 12px 40px;
        }

        .nav-logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: var(--text);
            text-decoration: none;
        }
        .nav-logo span { color: var(--gold); }

        .nav-links { display: flex; align-items: center; gap: 32px; }
        .nav-links a { font-size: 0.85rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text); }

        .nav-cta {
            background: linear-gradient(135deg, var(--gold), #b8832a);
            color: #0a0a0a !important;
            font-weight: 700 !important;
            padding: 9px 22px;
            border-radius: 8px;
            text-decoration: none;
        }

        /* HERO SECTION - Onde a fonte estava maior */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 120px 20px 80px;
            text-align: center;
        }

        .hero-title {
            font-family: 'Bebas Neue', cursive;
            font-size: clamp(3rem, 12vw, 6rem);
            line-height: 0.95;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }

        .hero-title .line2 { color: var(--gold); }
        .hero-title .line3 { 
            display: block; 
            opacity: 0.5; 
            font-size: 50%; 
            letter-spacing: 4px; 
            margin-top: 10px;
        }

        .btn-primary {
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--gold), #b8832a);
            border-radius: 12px;
            color: #0a0a0a;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Ajustes mobile */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-title { font-size: clamp(2.5rem, 15vw, 4rem); }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }

        /* Estilos de reveal e outros que você já tinha */
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s all ease; }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        
        /* ... (Mantenha o restante do seu CSS aqui, mas verifique as aspas) ... */
    </style>
</head>
<body>
    <nav id="navbar">
        <a href="#" class="nav-logo">BARBER<span>FLOW</span></a>
        <div class="nav-links">
            <a href="#features">Funcionalidades</a>
            <a href="#como-funciona">Como Funciona</a>
            <a href="#preco">Preço</a>
            <a href="#" class="nav-cta">Começar Grátis</a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="line1">SUA BARBEARIA</span>
                <span class="line2">NO CONTROLE</span>
                <span class="line3">SEUS CLIENTES NO HORÁRIO</span>
            </h1>
            <a href="#" class="btn-primary">✂️ Começar grátis — 7 dias</a>
        </div>
    </section>

    </body>
</html>
