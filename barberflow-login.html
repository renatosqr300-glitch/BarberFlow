<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarberFlow — Entrar</title>
    
    <!-- Google Fonts Corrigidas -->
    <link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)">
    <link rel="preconnect" href="[https://fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
    <link href="[https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap](https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap)" rel="stylesheet">
    
    <style>
        :root {
            --dark: #0e0e0e;
            --dark2: #161616;
            --dark3: #1f1f1f;
            --gold: #c9973a;
            --gold-light: #e8b04a;
            --gold-dim: rgba(201,151,58,0.15);
            --text: #f0ece4;
            --text-muted: #888;
            --border: rgba(201,151,58,0.2);
            --error: #e05555;
            --success: #4caf7d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--dark);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            color: var(--text);
        }

        /* LEFT PANEL */
        .left {
            width: 50%;
            background: var(--dark2);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .left::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 30% 40%, rgba(201,151,58,0.08) 0%, transparent 70%);
        }

        .left-content {
            position: relative;
            z-index: 2;
            padding: 40px;
            max-width: 520px;
        }

        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 4rem;
            color: var(--text);
            letter-spacing: 4px;
            line-height: 1;
        }
        .logo span { color: var(--gold); }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        .feature-item { display: flex; gap: 15px; align-items: flex-start; }
        .feature-icon { 
            width: 40px; height: 40px; background: var(--gold-dim); 
            border-radius: 8px; display: flex; align-items: center; 
            justify-content: center; flex-shrink: 0;
        }

        /* RIGHT PANEL */
        .right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: var(--dark);
        }

        .form-container { width: 100%; max-width: 380px; }

        h2 { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; margin-bottom: 10px; }

        .tabs {
            display: flex;
            background: var(--dark3);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1; padding: 10px; border: none; background: transparent;
            color: var(--text-muted); font-family: 'DM Sans', sans-serif;
            cursor: pointer; border-radius: 8px; font-weight: 600;
        }

        .tab.active { background: var(--dark); color: var(--text); }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }

        input {
            width: 100%; background: var(--dark3); border: 1px solid rgba(255,255,255,0.06);
            padding: 14px; border-radius: 10px; color: var(--text); outline: none;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary {
            width: 100%; padding: 16px; 
            background: linear-gradient(135deg, var(--gold), #b8832a);
            border: none; border-radius: 10px; color: #000;
            font-weight: 700; font-family: 'DM Sans', sans-serif;
            cursor: pointer; margin-top: 10px;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .left { width: 100%; padding: 40px 20px; min-height: auto; }
            .feature-list { display: none; }
            .logo { font-size: 3rem; text-align: center; }
        }
    </style>
</head>
<body>

<div class="left">
    <div class="left-content">
        <div class="logo">BARBER<span>FLOW</span></div>
        <p style="color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; margin-top: 5px;">Agendamento para Barbearias</p>
        
        <div class="feature-list">
            <div class="feature-item">
                <div class="feature-icon">✂️</div>
                <div>
                    <p style="font-weight: 700;">Multi-Agenda</p>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Controle sua equipe em tempo real.</p>
                </div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">💬</div>
                <div>
                    <p style="font-weight: 700;">WhatsApp Automático</p>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Reduza faltas com lembretes.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="right">
    <div class="form-container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Entrar</button>
            <button class="tab" onclick="switchTab('cadastro')">Criar Conta</button>
        </div>

        <div id="loginForm">
            <h2>Bem-vindo</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">Acesse sua conta para gerenciar a agenda.</p>
            
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button class="btn-primary">Entrar na minha conta</button>
        </div>

        <div id="cadastroForm" style="display:none">
            <h2>Nova Conta</h2>
            <p style="color: var(--text-muted); margin-bottom: 25px;">Comece seus 7 dias grátis.</p>
            <div class="form-group">
                <label>Barbearia</label>
                <input type="text" placeholder="Nome da sua barbearia">
            </div>
            <div class="form-group">
                <label>WhatsApp</label>
                <input type="tel" placeholder="(11) 99999-9999">
            </div>
            <button class="btn-primary">Criar conta grátis</button>
        </div>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('cadastroForm').style.display = tab === 'cadastro' ? 'block' : 'none';
        
        const tabs = document.querySelectorAll('.tab');
        tabs[0].classList.toggle('active', tab === 'login');
        tabs[1].classList.toggle('active', tab === 'cadastro');
    }
</script>

</body>
</html>
