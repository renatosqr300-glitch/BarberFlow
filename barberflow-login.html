<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarberFlow — Entrar</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark: #0e0e0e;
            --dark2: #161616;
            --dark3: #1f1f1f;
            --gold: #c9973a;
            --text: #f0ece4;
            --text-muted: #888;
            --border: rgba(255,255,255,0.06);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background: var(--dark);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            color: var(--text);
            overflow-x: hidden;
        }

        /* PAINEL ESQUERDO (Decorativo - Não bloqueia toque) */
        .left {
            width: 50%;
            background: var(--dark2);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none; 
        }

        .left::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 30% 40%, rgba(201,151,58,0.08) 0%, transparent 70%);
        }

        .left-content {
            position: relative;
            z-index: 2;
            padding: 40px;
            max-width: 520px;
        }

        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 4rem;
            color: var(--text);
            letter-spacing: 4px;
            line-height: 1;
        }
        .logo span { color: var(--gold); }

        /* PAINEL DIREITO (Onde a interação acontece) */
        .right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: var(--dark);
            position: relative;
            z-index: 10; 
        }

        .form-container { 
            width: 100%; 
            max-width: 380px; 
            position: relative;
            z-index: 20;
        }

        h2 { 
            font-family: 'Bebas Neue', cursive; 
            font-size: 2.8rem; 
            margin-bottom: 10px; 
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            background: var(--dark3);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1; padding: 12px; border: none; background: transparent;
            color: var(--text-muted); font-family: 'DM Sans', sans-serif;
            cursor: pointer; border-radius: 10px; font-weight: 700;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .tab.active { 
            background: var(--dark); 
            color: var(--text);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-weight: 700;
        }

        input {
            width: 100%; 
            background: var(--dark3); 
            border: 1px solid var(--border);
            padding: 16px; 
            border-radius: 12px; 
            color: var(--text); 
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--gold);
            background: #1a1a1a;
        }

        /* Botão estilizado como link para garantir navegação */
        .btn-primary {
            display: block;
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, var(--gold), #b8832a);
            border: none; 
            border-radius: 12px; 
            color: #000;
            font-weight: 800; 
            font-family: 'DM Sans', sans-serif;
            text-align: center;
            text-decoration: none;
            cursor: pointer; 
            margin-top: 10px;
            font-size: 1rem;
            box-shadow: 0 8px 25px rgba(201,151,58,0.2);
            transition: transform 0.1s;
        }

        .btn-primary:active { transform: scale(0.97); }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .left { 
                width: 100%; 
                padding: 60px 20px 20px; 
                min-height: auto; 
            }
            .logo { font-size: 3.5rem; text-align: center; }
            .right { padding: 40px 24px 80px; }
            h2 { font-size: 2.4rem; }
        }
    </style>
</head>
<body>

<div class="left">
    <div class="left-content">
        <div class="logo">BARBER<span>FLOW</span></div>
        <p style="color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; margin-top: 5px; text-align: center;">Agendamento para Barbearias</p>
    </div>
</div>

<div class="right">
    <div class="form-container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Entrar</button>
            <button class="tab" onclick="switchTab('cadastro')">Criar Conta</button>
        </div>

        <div id="loginForm">
            <h2>Bem-vindo</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Acesse sua conta para gerenciar a agenda.</p>
            
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••••">
            </div>
            <!-- Substitua 'dashboard.html' pelo nome da sua próxima página -->
            <a href="dashboard.html" class="btn-primary">Entrar na minha conta</a>
        </div>

        <div id="cadastroForm" style="display:none">
            <h2>Nova Conta</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Comece seus 7 dias grátis.</p>
            <div class="form-group">
                <label>Nome da Barbearia</label>
                <input type="text" placeholder="Ex: Barber Shop">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" placeholder="contato@barber.com">
            </div>
            <a href="dashboard.html" class="btn-primary">Criar conta grátis</a>
        </div>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('cadastroForm').style.display = tab === 'cadastro' ? 'block' : 'none';
        
        const tabs = document.querySelectorAll('.tab');
        tabs[0].classList.toggle('active', tab === 'login');
        tabs[1].classList.toggle('active', tab === 'cadastro');
    }
</script>

</body>
</html>
